id: T-0002b-1
titre: "MCP Graph : réécriture du code stdio → HTTP streamable + identité managée"
capacite: "Socle d'exploitation / Orchestration des agents"
phase: 1
type_action: edition_code
cran: auto            # édition de code en branche (editer_fichier_en_branche → auto) ; la FUSION reste la porte du gardien (PR)
produit:
