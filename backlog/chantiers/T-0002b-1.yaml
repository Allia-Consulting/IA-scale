# ultérieure distincte. La fusion du code reste la porte du gardien (PR), comme tout artefact.
contrats_concernes:
  - "contrats/socle/modele-donnees.md"
criteres_acceptation:
  - "server.py expose /mcp en streamable HTTP (stateless_http=True) et /healthz séparé"
  - "L'authentification SORTIE Graph utilise DefaultAzureCredential ; GRAPH_CLIENT_SECRET n'existe plus"
  - "Le garde-fou d'écriture (création uniquement en Zone-de-proposition) est conservé"
  - "README outils/mcp-graph mis à jour (transport HTTP, /healthz, identité managée) ; aucun secret dans le dépôt"
  - "L'agent ouvre une PR (candidat) ; il ne merge pas"
rayon_impact: local
statut: à_faire
note: >
  Sous-tâche CODE de la chapeau T-0002b. Réécrit outils/mcp-graph/ pour le modèle HTTP distant
  (architecture.md B.4 bis). Frontière de SORTIE Graph = zéro secret (identité managée) : c'est ICI
  que server.py passe à DefaultAzureCredential et perd GRAPH_CLIENT_SECRET. La frontière d'ENTRÉE
