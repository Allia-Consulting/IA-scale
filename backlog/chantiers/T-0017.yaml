    execution: "runbook exécuté le 26 juin 2026 (Cloud Shell, identité du gardien). IDS RÉSOLUS via le connecteur M365 (sharepoint_folder_search) : drive b!44CicXj16kaqbdbelsTnPUundQ8Qe5JKmBk7kAxljRO8Hx-KrTj1QJbs4Mp6eHK7 (bibliothèque Documents) + folder 01BWFCBZCIIKSDFFWJ5BC3FM5X3PUQXMD7 (00 - Proposition en cours), cibles confirmées par web_url sous AlliaConsulting-Contratsetadministratif. POSÉS sur ca-allia-mcp-graph (RG rg-ia-scale) via az containerapp update --set-env-vars ; révision active ca-allia-mcp-graph--0000007 RunningAtMaxScale/Healthy/100, image 0.4.0. FAIT DURCI : « b! » du drive id corrompu en « bpwd… » par l'expansion d'historique bash lors d'un collage nu ; corrigé en posant la valeur en SIMPLES QUOTES, valeur réelle re-vérifiée par az containerapp show. OCTROI WRITE PROUVÉ (≠ hypothèse) : test d'écriture réel via televerser_brouillon_offre (flux humain délégué Claude Code) → succès, TEST-T0017b-20260626.docx déposé dans 00 - Proposition en cours, item_id 01BWFCBZHER3XU2KLEBJBIORQQ6UEB4QC6. Fichier de test à retirer manuellement (suppression = geste humain, proscrite à l'agent ; collision=fail). Reste hors périmètre T-0017 : la mise en service du skill T-0016-b (génération du brouillon)."
