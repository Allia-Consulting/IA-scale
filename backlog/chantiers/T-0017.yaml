note: >
  Architecture « Voie 1 » actée par le gardien. Le brouillon d'offre vit comme .docx dans la
  bibliothèque de travail 00 - Proposition en cours ; un item de traçabilité « brouillon généré » est
  écrit EN PARALLÈLE en Zone-de-proposition via create_list_item (double-écriture portée par T-0016-b),
  qui devient le JOURNAL des brouillons générés. Le connecteur ne gagne qu'UNE action d'écriture
  fichier, à cible figée comme la liste l'est déjà — l'émission de l'offre reste proscrite et humaine.
