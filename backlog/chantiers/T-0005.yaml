id: T-0005
titre: "Mémoire d'organisation : rendez-vous hebdo en session claude.ai → synthèse hebdo candidate"
capacite: "Connaissance, contenu & IP / Mémoire d'organisation"
phase: 1
type_action: infrastructure_mcp
cran: valide
produit:
  - "rendez-vous hebdomadaire en session claude.ai (le vendredi) qui écoute les conversations Claude + Teams de la semaine et produit UNE synthèse candidate"
  - "écriture de la synthèse en zone de proposition avec champ d'origine « mémoire hebdo » (liste réelle via create_list_item ; T-0002b promu — simulation locale abandonnée)"
  - "rituel de validation ligne à ligne le vendredi (non-validé = oublié)"
  - "exécution en SESSION CLAUDE.AI de l'espace Allia, sous l'identité du gardien — zéro secret (identites-et-secrets.md §2, cas 3 ; décision du 30 juin 2026, supersède le 10 juin)"
depend_de: []
# Aucune dépendance dure de chantier. PRÉREQUIS NORMATIFS (non bloquants pour la sélection,
#   mais à respecter avant toute écoute réelle) :
#   1) PROMOTION du contrat socle candidat contrats/socle/memoire-organisation.md par le gardien
#      — le batch exécute ce contrat ;
#   2) PROMOTION du CADRE RGPD contrats/socle/rgpd-ecoute-teams.md par le gardien-DPO — l'écoute
#      Teams/Claude est un traitement de données personnelles : finalité limitée aux apprentissages
#      COLLECTIFS, base légale d'intérêt légitime, minimisation/rétention (suppression du verbatim
#      brut et du non-validé après la décision du vendredi), information préalable AVANT écoute,
#      droits des personnes, AIPD. (Remplace toute mention vague de « cadrage RGPD ».)
#   L'écriture RÉELLE en M365 via create_list_item est en service (T-0002b promu) ; simulation
#   (zone-proposition/memoire/). L'écriture continue est abandonnée (décision 8 juin 2026) au
#   profit d'une synthèse hebdomadaire candidate.
contrats_concernes:
  - "contrats/socle/memoire-organisation.md"
  - "contrats/socle/rgpd-ecoute-teams.md"
  - "contrats/socle/modele-donnees.md"
  - "contrats/socle/anonymisation.md"
criteres_acceptation:
  - "Le mécanisme s'exécute en session claude.ai, en rendez-vous hebdomadaire le vendredi, et produit UNE synthèse candidate de la semaine"
  - "La synthèse est écrite en zone de proposition, champ d'origine « mémoire hebdo » (liste réelle via create_list_item)"
  - "La synthèse reste INTERNE et NOMINATIVE ; toute sortie externe d'un fragment passe la porte d'anonymisation (anonymisation.md §1)"
  - "Le vendredi, une validation ligne à ligne est possible ; le non-validé est oublié (pas de rétention par défaut)"
  - "RGPD : cadre rgpd-ecoute-teams.md v1.2 et ses trois annexes promus ; périmètre d'écoute conforme à l'annexe 1 §3 (exclusion des 1-à-1 Teams ; Claude : espace Allia Consulting uniquement) ; information préalable du collaborateur AVANT écoute ; verbatim brut supprimé à J+7 après la validation du vendredi ; synthèse non validée supprimée."
  - "L'agent n'écrit jamais la mémoire comme une source et ne promeut jamais"
rayon_impact: local
statut: soldé # épreuve réelle faite le 1er juillet 2026 en session claude.ai (voir execution:)
execution:
- "2026-07-01 — Épreuve réelle du mécanisme en session claude.ai (espace Allia), semaine ISO 2026-S27."
- "Collecte conforme au périmètre annexe 1 §3 : conversations Claude bornées à l'espace Allia (gardien) ; Teams via chat_message_search borné à la semaine, 1-à-1 explicitement exclus. Aucun canal d'équipe ni conversation de mission éligible au tenant cette semaine."
- "Résultat : UNE synthèse candidate à zéro ligne d'apprentissage (résultat valide, skill §4 — pas de remplissage artificiel), car la semaine fut 100% gouvernance déjà tracée au canon (PR #131/#132/#133)."
- "Écriture RÉELLE en zone de proposition prouvée à la source : élément Title=MEM-2026-S27, Origine=« mémoire hebdo », Contenu=synthèse — vérifié dans la liste SharePoint Zone-de-proposition (relecture visuelle à la source le 1er juillet 2026)."
- "RÉSERVE (honnête) : écriture faite via l'UI SharePoint sous l'identité du gardien, PAS via le connecteur MCP create_list_item (allia-graph-proposition NON exposé dans les sessions claude.ai). La chaîne canon→M365 est éprouvée sur vraie donnée tenant ; l'exercice littéral de create_list_item reste à rejouer une session où le connecteur est exposé. Non maquillé en « éprouvé via connecteur »."
- "Validation du vendredi : triviale ici (zéro puce) — rien à promouvoir en mémoire ; la synthèse candidate est oubliée à la décision, conforme au régime de rétention (skill §rétention ; rgpd-ecoute-teams.md §4)."
note: >
  Matérialise la capacité « mémoire d'organisation » (organisation.md §2 ; contrat
  contrats/socle/memoire-organisation.md, candidat). Mécanisme retenu (session doctrine
  8 juin 2026) : batch nocturne hebdomadaire produisant UNE synthèse candidate — l'écriture
  continue est abandonnée (ni relisible, ni gouvernable à la promotion). Domicile transitoire :
  zone-proposition/memoire/ (simulation locale) en attendant l'écriture réelle (T-0002b).
  Le dérivé n'est jamais le saisi : la synthèse est candidate, validée ligne à ligne le vendredi.
  DÉCISION DU 10 JUIN 2026 (stop doctrine) : le batch tourne en COWORK LOCAL sur le poste du
  gardien, sous l'identité Entra DU GARDIEN (zéro secret — contrats/socle/identites-et-secrets.md
  §2, cas 3). Justification : la mémoire est un acte de gouvernance (analyse et promotion, gardien
  seul) — la dépendance est au RÔLE, pas au poste par accident. ÉCART À architecture.md B.4 ASSUMÉ
  ET BORNÉ : limité à la mémoire d'organisation, réversible à la fédération du rôle gardien. Ne
  change ni le mécanisme (synthèse hebdo candidate) ni les prérequis normatifs RGPD.
  MISE À JOUR 12 juin 2026 : balance et AIPD produites (annexes 1 et 2 du cadre RGPD) — le
  verrou normatif de l'écoute réelle est levé à leur promotion ; le périmètre d'écoute est
  borné par l'annexe 1 §3.
  MISE À JOUR 30 juin 2026 : domicile d'exécution corrigé — SESSION CLAUDE.AI de l'espace Allia
  (rendez-vous hebdo le vendredi) au lieu de Cowork local. Motif (confronté au réel, T-0005) : seule
  une session claude.ai expose l'écoute des conversations Claude (recherche d'historique de chat) ;
  Cowork et Claude Code ne l'exposent pas. Supersède la décision du 10 juin sur le DOMICILE et le
  DÉCLENCHEMENT ; le principe demeure (acte de gouvernance, identité du gardien, zéro secret).
  Voir contrats/socle/memoire-organisation.md v1.4.
