note: >
  Chantier de PHASE 3/4 (parallèle au réconciliateur de droits, plan §9 T-4.3, et à la couche de
  résolution automatique de Phase 3). INSCRIT AU BACKLOG, À NE PAS CONSTRUIRE EN PHASE 1 — c'est
  la décision de la session doctrine du 8 juin 2026 : pour le parc, on canonise d'abord la POLITIQUE
  (parc-collaborateur.md, candidat) et on exécute par RUNBOOK HUMAIN (T-0006) ; l'automatisation
  politique→Intune vient plus tard. C'est l'application aux APPAREILS de la chaîne d'autorité
  guide → Claude → M365 (doctrine §8, ligne candidate v1.4).
