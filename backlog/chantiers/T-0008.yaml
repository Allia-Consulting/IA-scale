# Inscrit au BACKLOG, PAS à construire maintenant (Phase 3/4). Aucune dépendance dure tant
# qu'il n'est pas ordonnancé. PRÉREQUIS NORMATIF : promotion de parc-collaborateur.md (la
# politique à projeter). La mise en place du privilège du réconciliateur (app/identité, octrois)
# reste un RUNBOOK HUMAIN (organisation.md §5, plan §2), jamais un agent.
contrats_concernes:
  - "contrats/socle/parc-collaborateur.md"
  - "contrats/socle/organisation.md"
