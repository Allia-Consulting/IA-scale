id: T-0020
titre: "Phase 2 — Qualité : evals, observabilité, agent-gardien renforcé, mesure de valeur (chantier-chapeau)"
capacite: "Socle d'exploitation & gouvernance / Évaluation & observabilité"
phase: 2
type_action: gouvernance_qualite
cran: valide
produit:
  - "TÂCHE-CHAPEAU (plan §7) : la barrière qui rend l'autonomie tenable. Décomposée en quatre sous-tâches T-0020-a..d — un seul fichier, pas d'éclatement prématuré."
depend_de: []
contrats_concernes:
  - "doctrine/doctrine.md"
  - "backlog/plan.md"
criteres_acceptation:
  - "Critère de sortie du plan §7 : une PR à faible risque et conforme passe sans le gardien ; toute régression d'un skill est bloquée par la CI."
rayon_impact: "Toute la firme : chaque PR passe par le harnais ; l'agent-gardien filtre chaque promotion ; les KPI alimentent le tour de contrôle."
statut: en_cours
sous_taches:
  - id: T-0020-a
    titre: "Harnais d'evals des skills — golden set versionné par skill, exécuté en CI sur chaque PR"
    produit:
      - "evals/harnais.py : runner déterministe v0 — validation sémantique des golden sets, couverture bidirectionnelle skills↔golden, invariants d'en-tête universels, ancres sémantiques verbatim par skill"
      - "evals/skills/<id>/golden.yaml pour chacun des 9 skills existants"
      - ".github/workflows/evals.yml : exécution sur chaque PR — rouge bloque dès que le check est requis par le ruleset (porte item 2 de l'ordre de bataille)"
      - "Schéma golden extensible : type 'scenario' (scoring LLM) réservé, non implémenté en v0"
    depend_de: []
    criteres_acceptation:
      - "Un skill sans golden set fait échouer la CI ; un golden orphelin aussi"
      - "Éprouvé rouge-puis-vert sur le réel : une PR de test dégradant une ancre d'un skill est bloquée (check rouge sur son head_sha), puis fermée sans merge"
    execution: >
      Livré en PR #153. ÉPROUVÉ sur le réel le 03/07/2026 : PR de test #154 (régression
      volontaire d'une ancre de cadrage-mission) bloquée ROUGE par le check
      « Evals — non-régression des skills » sur son head_sha exact, puis fermée sans merge.
      Le harnais est VERT sur la PR #153.
    statut: solde
  - id: T-0020-b
    titre: "Observabilité MCP Graph — journal structuré des appels d'outils"
    produit:
      - "Journal structuré par appel : horodatage, outil, cran, résultat (succès/refus/erreur), sans donnée personnelle en clair"
    depend_de: []
    criteres_acceptation:
      - "Chaque appel d'outil MCP Graph laisse une trace consultable ; une journée réelle de production est relue depuis le journal"
    execution: >
      Code livré en PR #169 (mergée le 05/07/2026, HEAD 3d79120c) : décorateur
      _journal_appel posé sur les 9 outils — une ligne JSON par appel (ts UTC, outil,
      cran résolu de la table v1.9, resultat succes/refus/erreur, duree_ms, type_erreur),
      AUCUNE donnée personnelle ni argument, comportement des outils inchangé (schémas
      MCP identiques à travers functools.wraps). MIS EN SERVICE le 05/07/2026 : image
      allia-mcp-graph:0.10.0 (digest sha256:e5579cce…), révision ca-allia-mcp-graph--0000015
      (confirmée active à 100 % du trafic, 1 réplica, le 10/07/2026 à la source Azure).
      SOLDÉ le 10/07/2026 par relecture Log Analytics (espace workspace-rgiascaleQW10,
      table ContainerAppConsoleLogs_CL, réf. Microsoft Learn « Monitor logs in Azure
      Container Apps », fr-fr, consultée le 10/07/2026). Relecture sur 30 jours : le
      journal écrit bien au format attendu, sans donnée personnelle — ligne réelle
      {"journal": "mcp-graph", "ts": "2026-07-05T16:33:12.511+00:00", "outil": "list_items",
      "cran": "auto", "resultat": "succes", "duree_ms": 3363} relue depuis Log Analytics.
      RÉSERVE ASSUMÉE (gardien, 10/07/2026) : à cette date le MCP n'a reçu qu'un seul
      appel réel (ce list_items) ; il n'existe pas encore de journée à fort volume. Le
      journal est prouvé fonctionnel/conforme/sans PII sur appel réel ; le volume de
      production sera couvert par l'usage et par les KPI de T-0020-d (dérivés/semaine,
      délai brief→kick-off) une fois la composition bout-en-bout exécutée.
    statut: solde
  - id: T-0020-c
    titre: "Agent-gardien v1 — rayon d'impact calculé sur les consommateurs réels + auto-approbation du faible risque contre politique"
    produit:
      - "Remplacement du grep fruste de conformite.yml par un calcul d'impact sur les consommateurs réels (qui consomme, combien d'artefacts, quelles missions en cours)"
      - "Auto-approbation du faible risque CONTRE POLITIQUE (doctrine §3) — rend inutile le bypass temporaire de congé"
    depend_de: ["T-0020-a"]
    criteres_acceptation:
      - "Une PR à faible risque conforme est approuvée par l'agent-gardien sans le gardien humain ; une PR à impact large remonte"
    marches:
      - marche: 1
        titre: "Calcul d'impact fin déterministe (remplace le grep fruste)"
        reference_plan: "§7 T-2.2"
        statut: solde   # LIVRÉE + ÉPROUVÉE sur le réel (PR #185, agent-gardien v1 en production)
        execution: >
          Livrée le 10/07/2026 : outil outils/agent-gardien/impact.py (stdlib + PyYAML)
          — indexe le dépôt, parse toutes les formes de dépendance déclarées (adosse_a,
          contrats_concernes, depend_de, skills:[id], domicile ; citations canoniques en
          backticks/guillemets, leading-slash, suffixe paragraphe), construit le graphe
          inverse des consommateurs, calcule consommateurs directs+transitifs, n_artefacts,
          rayon et RISQUE par règles déterministes (doctrine §6 : socle/doctrine et
          workflows requis => large ; local/skills/agents => large si consommateur socle
          ou > N ; backlog/evals/outils => faible), et signale la casse STRUCTURELLE
          (référence pendante). Émet markdown + JSON, terminés par 'RISQUE:' puis 'VERDICT:'.
          ÉPROUVÉ ROUGE-PUIS-VERT en unitaire (outils/agent-gardien/tests/test_impact.py,
          6 tests : socle très consommé, local isolé, skills:[id], référence cassée,
          transitivité, format de sortie). Workflow .github/workflows/conformite.yml
          réécrit en v1 : impact déterministe + jugement LLM BORNÉ à la casse sémantique
          (ne recalcule pas le rayon) + verdict combiné. Nom du check « Avis d'impact »
          PRÉSERVÉ (requis au ruleset). ÉPREUVE D'INTÉGRATION CONCLUANTE sur le réel le
          10/07/2026 (PR #185, head 611fc8e9, agent-gardien v1 EN PRODUCTION sur main) :
          PR mixte inerte (commentaires seuls) — table-des-crans (socle) classé rayon
          LARGE / RISQUE LARGE / 82 consommateurs ; T-0029 (feuille backlog) LOCAL /
          FAIBLE ; casse structurelle false ; jugement LLM borné casse sémantique = non ;
          RISQUE global large ; VERDICT pass ; check « Avis d'impact » completed/success.
          Discrimination du rayon PROUVÉE sur une vraie PR. PR #185 fermée sans merge
          (contrat socle inerte, jamais promu). Marche 1 SOLDÉE.
      - marche: 2
        titre: "Auto-approbation du faible risque contre politique"
        reference_plan: "§7 T-2.4"
        statut: a_faire
        note: >
          NON incluse dans la marche 1. Requiert une identité de promotion (GitHub App
          du gardien) et un bypass gouverné du ruleset main-protection pour que l'agent
          approuve/merge le faible risque conforme sans l'humain — geste d'habilitation
          gardien. Doctrine §3 : l'auto-approbation du faible risque est permise à la
          tête-agent ; promouvoir un changement À RISQUE sans l'humain reste interdit.
          RAFFINEMENTS à traiter en marche 2 (l'auto-approbation exige un impact FIABLE) :
          (a) exclure l'artefact de travail changed-files.txt du scan des consommateurs —
          faux positif observé à l'épreuve #185 (T-0029 compté 1 consommateur = ce fichier) ;
          (b) résoudre la citation d'un chantier par son id EN PROSE (ex. « T-0029 » dans
          doctrine §10) comme consommation, au même titre que les ids de skills.
    statut: en_cours   # -c ouvert : marche 1 SOLDÉE (éprouvée sur le réel PR #185), marche 2 (auto-approbation) à faire (10/07/2026)
  - id: T-0020-d
    titre: "Mesure de valeur organisationnelle — 3 KPI consommés par le tour de contrôle"
    produit:
      - "Missions actives · dérivés promus/semaine · délai brief→kick-off, calculés depuis les sources réelles M365 et affichés au cockpit (même surface que T-0014-b)"
    depend_de: ["T-0020-b"]
    criteres_acceptation:
      - "Les 3 KPI s'affichent sur données réelles du tenant — le SI passe de « se gouverne » à « prouve la valeur à l'échelle »"
    statut: a_faire
  - id: T-0020-e
    titre: "Tests pytest des garde-fous fail-closed de server.py, requis en CI"
    produit:
      - "outils/mcp-graph/tests/ : pytest couvrant _verifier_appelant (fail-closed token), _composer_nom_espace, et les garde-fous de deposer_document_mission (liste blanche sous-dossier, assainissement nom, extension, format sha256, base64, INTÉGRITÉ sha256 fail-closed T-0024-d)"
      - "outils/mcp-graph/requirements-dev.txt (pytest, hors image de prod)"
      - ".github/workflows/tests-garde-fous.yml : workflow dédié « Tests garde-fous MCP » portant le job « Tests garde-fous server.py » — TOUJOURS rapporté (sans filtre paths) ; pytest réel si outils/mcp-graph/** change, sinon skip vert (correctif #175 après l'incident #174 : un check requis borné par paths bloquait les PR hors-MCP en « waiting for status »)"
      - "Check « Tests garde-fous server.py » REQUIS au ruleset main-protection (runbook gardien FAIT — vérifié à la source le 06/07/2026 : les 3 checks requis sont Avis d'impact, Harnais skills, Tests garde-fous server.py) : rouge bloque, actif"
    depend_de: []
    criteres_acceptation:
      - "Chaque garde-fou fail-closed a au moins un test qui prouve le refus (exception attendue)"
      - "Le garde-fou d'intégrité sha256 (T-0024-d) est prouvé : mismatch → ValueError AVANT tout appel réseau (mock httpx jamais touché)"
      - "Éprouvé rouge-puis-vert : une régression volontaire d'un garde-fou fait échouer le job sur le head_sha exact, puis est corrigée"
    execution: >
      Tests pytest des garde-fous fail-closed de server.py livrés (29 tests collectés, dont 2 paramétrés, test_garde_fous.py) :
      _verifier_appelant (fail-closed token), _composer_nom_espace, et les garde-fous de
      deposer_document_mission dont l'INTÉGRITÉ sha256 fail-closed (T-0024-d). Workflow dédié
      .github/workflows/tests-garde-fous.yml, check « Tests garde-fous server.py » REQUIS au
      ruleset main-protection. ÉPROUVÉ ROUGE-PUIS-VERT sur le réel le 10/07/2026 : PR d'épreuve
      #180 (branche epreuve-rouge-t0020e-integrite, base main de73875f, head_sha
      42a2078384b2eb5e7101a53589bafd3d8869d678) dégradant le garde-fou d'intégrité
      (server.py:843 « if sha256_recu != sha256_attendu: » → « if False: », 1 fichier / 1 ligne).
      Résultat vérifié à la source : check « Tests garde-fous server.py » completed/FAILURE
      (test integrite_mismatch : DID NOT RAISE ValueError) ET check « Avis d'impact »
      completed/FAILURE (l'agent-gardien a détecté un risque à examiner) → main-protection a
      bloqué le merge. PR #180 fermée SANS merge, branche supprimée, main resté de73875f,
      garde-fou intact au canon (aucune régression n'a touché main). Le VERT est l'état nominal
      de main. Garde-fous du code MCP prouvés vivants : leur neutralisation est détectée ET bloquée.
    rayon_impact: local
    statut: solde
