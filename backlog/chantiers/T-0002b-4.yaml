id: T-0002b-4
titre: "MCP Graph : app registration « serveur » Easy Auth + secret (frontière d'entrée) — runbook humain"
capacite: "Socle d'exploitation / Orchestration des agents"
phase: 1
type_action: runbook_humain
cran: valide
produit:
  - "app registration « serveur » dans Entra (frontière d'ENTRÉE du service)"
  - "secret serveur (UN secret unique, pas un secret par utilisateur ; stocké hors dépôt)"
  - "activation de la built-in auth Entra ID (« Easy Auth ») de Container Apps en mode Return401 : tout appel sans bearer token OAuth 2.0 valide → 401"
depend_de: ["T-0002b-3", "RUNBOOK-HUMAIN"]
# Sous-tâche de la chapeau T-0002b. RUNBOOK HUMAIN → sentinelle RUNBOOK-HUMAIN (proscrites :
#   créer une app registration, configurer l'authentification, stocker un secret — table-des-crans.yaml).
# Dépend de T-0002b-3 : Easy Auth se configure sur la container app déployée.
# FRONTIÈRE D'ENTRÉE, distincte du flux Graph : ce secret serveur n'a AUCUN rapport avec la sortie
#   Graph (qui reste zéro secret, identité managée). Ne pas confondre les deux régimes.
contrats_concernes: []
criteres_acceptation:
  - "L'app registration « serveur » existe ; un secret serveur unique est créé et stocké hors dépôt (jamais commité)"
  - "Easy Auth est activé en Return401 : un appel sans bearer OAuth 2.0 valide reçoit 401"
  - "Le « zéro secret côté Graph » reste intact : ce secret serveur est la frontière d'ENTRÉE, pas la sortie Graph"
rayon_impact: local
statut: promu
execution: "runbook humain exécuté le 10 juin 2026 (Cloud Shell Azure) : app registration « serveur » allia-mcp-graph-server-auth créée, mono-tenant (sign-in-audience AzureADMyOrg), avec son service principal — clientId (identifiant PUBLIC) 0028a5ff-925a-4700-b703-2f2d0ce728fc, Application ID URI api://0028a5ff-925a-4700-b703-2f2d0ce728fc (le resource que visent les clients pour obtenir un token). App role MCP.Invoke (allowedMemberTypes: Application, isEnabled: true) posé sur l'app serveur — l'OCTROI du rôle à l'app cliente = geste de T-0002b-5 ; la VALIDATION du claim roles dans le code du serveur = DIFFÉRÉE en micro-chantier T-0009. Secret serveur UNIQUE créé (az ad app credential reset, display-name easyauth-server-secret, durée 2 ans — EXPIRE JUIN 2028, rotation à anticiper), stocké hors dépôt dans le coffre du gardien ; côté Azure, porté par la container app comme secret microsoft-provider-authentication-secret (géré par la plateforme). Easy Auth ACTIVÉ sur ca-allia-mcp-graph : provider Microsoft Entra ID, clientId ci-dessus, issuer https://login.microsoftonline.com/a8d48a4e-329b-4302-b83a-5b085cefa944/v2.0 (tenant Allia), mode Return401 (az containerapp auth update --unauthenticated-client-action Return401) ; état vérifié par az containerapp auth show (clientId + issuer + action: Return401). Fait CLI durci : dans az containerapp auth microsoft update, --issuer et --tenant-id sont MUTUELLEMENT EXCLUSIFS (« cannot be configured to non empty strings at the same time ») alors que la doc Microsoft MCP les montre ensemble — passer --tenant-id SEUL, l'issuer est déduit automatiquement par le CLI. Preuve face 1 (la porte FERME) : POST /mcp sans token → 401, vérifié depuis le poste du gardien (seule IP admise par la restriction) ; GET /healthz externe → désormais 401 aussi (ATTENDU : Easy Auth intercepte tout l'ingress ; les sondes de la plateforme joignent le conteneur en direct — réplica Running, revision --0000002 toujours servie). Preuve face 2 (un token valide PASSE) : DIFFÉRÉE À T-0002b-5, décision du gardien — le Cloud Shell ne peut pas émettre de token pour une audience custom api://… (« not a supported MSI token audience », credential MSI interne) et le poste du gardien n'a pas le CLI az ; la face 2 est littéralement un critère d'acceptation de T-0002b-5, elle y sera prouvée avec le vrai principe appelant. Restriction IP « allow-gardien » (IP du gardien /32, posée en T-0002b-3) MAINTENUE jusqu'à T-0002b-5 (levée après preuve du passage avec token) — ceci REMPLACE le « à lever fin b-4 » de la trace b-3 (décision de prudence du gardien, 10 juin 2026)."
note: >
  Sous-tâche AUTH SERVEUR de la chapeau T-0002b. Frontière d'ENTRÉE : qui a le droit d'appeler /mcp.
  UN secret serveur (Easy Auth), distinct du flux Graph (sortie = zéro secret, identité managée). Runbook
  humain — créer app, configurer auth, stocker secret sont des actions PROSCRITES à un agent et à Claude
  (garde-fous CLAUDE.md ; plan §2 ; table-des-crans.yaml).
