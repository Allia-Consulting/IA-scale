id: T-0014
titre: "Tour de contrôle — cockpit utilisateur SPFx (construction)"
capacite: "Socle d'exploitation & gouvernance / Adoption & exploitation multi-utilisateurs (RBAC)"
phase: 3
type_action: infrastructure_spfx
cran: valide
produit:
- "web part SPFx (React / Fluent UI) déployée sur une page d'accueil du site AlliaConsuling, exécutant le parti-pris du contrat socle tour-de-controle.md"
- "(agent — cran auto) code de la web part : zones du cockpit manager (pipe, recrutement, rentabilité, activité), lecture des listes via le contexte SharePoint, modèle voir → creuser → agir"
- "(runbook humain) déploiement du .sppkg dans l'App Catalog du tenant ; mise en page de l'accueil — configuration tenant, proscrite à l'agent"
depend_de: ["RUNBOOK-HUMAIN"]
contrats_concernes:
- "contrats/socle/tour-de-controle.md"
- "contrats/socle/organisation.md"
- "contrats/socle/design-system.md"
- "contrats/socle/modele-donnees.md"
- "contrats/socle/table-des-crans.yaml"
criteres_acceptation:
- "La web part projette le parti-pris figé dans tour-de-controle.md (hiérarchie des zones, modèle voir → creuser → agir, honnêteté des données)"
- "Le cockpit lit les listes en consommateur (pull) ; il n'écrit jamais dans une source"
- "Les actions déclenchées portent le cran de l'action sous-jacente ; un dérivé reste écrit en Zone-de-proposition"
- "Le déploiement du .sppkg et la mise en page de l'accueil sont des runbooks humains, jamais l'agent"
- "Le rendu suit le design system (on consomme, on ne recopie pas)"
rayon_impact: large
statut: promu # cockpit construit + deploye tenant-wide + publie + rendu eprouve sur la page d'accueil le 26 juin 2026 ; branchement aux listes M365 reelles eprouve sur la page publiee le 03/07/2026 (reserve donnees demo levee, v1.1.1.0)
execution: >
  Eprouve sur le reel le 26 juin 2026 (poste du gardien + Claude in Chrome, identite du gardien).
  PARTIE AGENT (code, deja mergee #98/#99/#101) : web part SPFx 1.23.1 (rig Heft) / React 17,
  quatre zones (pipe, recrutement, rentabilite, activite) + bloc 'Demande a ton SI', modele
  voir->creuser->agir, honnetete des donnees (zones reelles vides affichent '—', pipe & recrutement
  en donnees de demonstration explicitement etiquetees). La zone Recrutement integre T-0013-b
  (compteur Suivi par etape) comme decide : cockpit = surface unique du collaborateur.
  PARTIE RUNBOOK HUMAIN DU GARDIEN (cette session) : build production (npx heft build --production,
  0 erreur, lint OK) puis package (npx heft package-solution --production) -> sharepoint/solution/
  tour-de-controle.sppkg. App Catalog du tenant CREE (provision unique, declenchee par navigation
  sous session admin). .sppkg televerse et solution DEPLOYEE : etat Enabled, 'disponible sur tous
  les sites de l'organisation' (coherent skipFeatureDeployment: true), aucun message d'erreur de
  package ; aucune permission API a approuver (web part en contexte SharePoint, pas de Graph).
  Note : l'ajout a Teams a echoue (sans incidence sur SharePoint). Web part placee sur la page
  d'accueil du site alliaconsuling et PAGE PUBLIEE (Publiee le 26/06/2026) ; rendu verifie sur la
  page live hors mode edition : sobriete respectee (aucun vert, aucune pastille), vides assumes.
  Identifiants : solution tour-de-controle-client-side-solution v1.0.0.0, App Catalog a
  /sites/appcatalog. RESERVE (chantier distinct) : le cockpit lit aujourd'hui des donnees de
  demonstration ; le branchement aux vraies listes M365 (critere 'lit les listes en consommateur')
  sera eprouve quand les missions tourneront et que le substrat sera peuple.

  Réserve levée le 03/07/2026 : cockpit branché sur les listes M365 réelles (PR #157 + correctif
  dataSiteUrl PR #158, v1.1.1.0 déployée à l'App Catalog). Éprouvé sur la page publiée du 03/07 :
  Zone-de-proposition = 5 dérivés récents (dont MEM-2026-S28), Imputations = 1 (IMP-1 Siteflow),
  pipe et recrutement à zéros réels, agrégats RGPD côté candidats. Diagnostic intermédiaire tracé :
  5 getByTitle en 404 sur le site racine — domicile des données ≠ site de la page, résolu par
  propriété dataSiteUrl configurée dans la page.

note: >
  Construction du cockpit dont la POLITIQUE est figée dans contrats/socle/tour-de-controle.md
  (promu v1.0). Répond au chantier nommé en doctrine §10 (« le cockpit du collaborateur reste
  à concevoir — le vrai test de l'adoption »). Phase 3 : suppose des données réelles dans les
  listes pour avoir de la valeur (substrat aujourd'hui quasi vide). Recommandation de séquençage :
  bâtir la web part contre des données de démonstration, la confronter à de vrais utilisateurs
  (Sarah, premiers consultants) avant de figer, puis brancher sur le réel quand les missions
  tournent. Maquette de référence : contrats/socle/maquettes/tour-de-controle-cockpit-v1.html.
