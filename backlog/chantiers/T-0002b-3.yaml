id: T-0002b-3
titre: "MCP Graph : déploiement Container App (min 1 réplica, identité managée) — runbook humain"
capacite: "Socle d'exploitation / Orchestration des agents"
phase: 1
type_action: runbook_humain
cran: valide
produit:
  - "environnement Container Apps + container app à partir de l'image (T-0002b-2)"
  - "scaling MIN 1 RÉPLICA (usage interactif réactif — le service ne dort pas)"
  - "attache de l'identité managée USER-ASSIGNED id-allia-mcp-graph (déjà autorisée — T-0002a-bis, fait)"
  - "ingress public + restrictions (IP restrictions / CORS au besoin)"
depend_de: ["T-0002b-2", "T-0002a-bis", "RUNBOOK-HUMAIN"]
# Sous-tâche de la chapeau T-0002b. RUNBOOK HUMAIN (déployer/configurer de l'infra Azure = proscrit à
#   l'agent, table-des-crans.yaml) → sentinelle RUNBOOK-HUMAIN (non sélectionnable en autonomie).
# Dépend de : T-0002b-2 (image disponible) ET T-0002a-bis (octroi write à l'identité managée, FAIT —
#   l'identité, déjà autorisée, est simplement attachée à la container app).
contrats_concernes:
  - "contrats/socle/modele-donnees.md"
criteres_acceptation:
  - "La container app tourne à partir de l'image ACR, min 1 réplica, sans dépendre du poste du fondateur"
  - "L'identité managée user-assigned id-allia-mcp-graph est attachée ; la sortie Graph fonctionne (zéro secret)"
  - "L'ingress public répond en TLS ; restrictions d'accès posées au besoin"
  - "/healthz répond aux sondes ; /mcp répond au JSON-RPC POST"
rayon_impact: local
statut: promu
execution: "runbook humain exécuté le 10 juin 2026 (Cloud Shell + Graph Explorer + UI SharePoint) : environnement Container Apps cae-ia-scale créé (francecentral, rg-ia-scale, workspace Log Analytics auto-généré workspace-rgiascaleQW10) ; container app ca-allia-mcp-graph déployée depuis acralliamcpgraph.azurecr.io/allia-mcp-graph:0.1.0 — pull par identité managée (--registry-identity, AcrPull auto-assigné par le CLI), identité user-assigned id-allia-mcp-graph attachée au runtime, min 1 / max 1 réplica, ingress externe TLS port 8000, FQDN ca-allia-mcp-graph.delightfulocean-1bf3f3c5.francecentral.azurecontainerapps.io. Restriction IP TRANSITOIRE « allow-gardien » (IP du gardien /32) : mitigation de la fenêtre pré-Easy-Auth (/mcp configuré et joignable avant T-0002b-4), vérifiée (403 hors IP, 200 depuis l'IP du gardien) — À LEVER à la fin de T-0002b-4. Sondes HTTP /healthz (Startup/Liveness/Readiness) posées par patch YAML, conformes au contrat T-0002b-1 §3 (jamais vers /mcp) ; revision finale ca-allia-mcp-graph--0000002, servie, avec les 4 variables d'env ET les 3 probes. Preuves de service : GET /healthz → 200 {\"status\":\"ok\"} ; POST /mcp initialize → réponse JSON-RPC serverInfo « allia-graph-proposition » (streamable HTTP OK). Prérequis découvert en cours de runbook : la liste « Zone-de-proposition » n'existait pas au tenant — créée le 10 juin par le gardien (UI SharePoint, colonne texte « Origine »), id Graph 2590d442-6e7d-4802-b271-451212ea10d4. Faits durcis de session (CLI/Azure) : la réponse ARM de az containerapp show peut omettre les value des variables d'env (la vérité se vérifie dans le conteneur ou par le comportement du service, jamais déduite de l'affichage de l'API) ; az containerapp update --yaml REMPLACE le template du conteneur (les clés absentes du YAML sont perdues — env écrasées par le patch probes, remises ensuite par --set-env-vars, patch ciblé sûr) ; az containerapp exec (websocket interactif) instable depuis Cloud Shell — préférer des vérifications non-interactives."
note: >
  Sous-tâche DÉPLOIEMENT de la chapeau T-0002b. Min 1 réplica (usage interactif — corrige la cible
  d'échelle antérieure). L'identité managée user-assigned a été CHOISIE (vs system-assigned) précisément
  pour être attachable ici alors que ses droits ont déjà été octroyés en amont (T-0002a-bis, fait).
  Durcissement réseau (VNet/internal-only) repoussé Phase 2/3. Runbook humain — config Azure.
