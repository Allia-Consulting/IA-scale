        RACINE : Graph renvoie le webUrl des drives PERCENT-ENCODÉ (« Documents%20partages »)
        alors que les chemins des props arrivent EN CLAIR (espaces, accents « Coût », « & » dans
        « Masse salariale & Indep ») ; la comparaison de préfixe brute (chaîne↔chaîne) échouait
        systématiquement → aucun drive porteur → anomalie « chemin hors des drives du site » pour
        les 8 tables. CORRECTION (solution SPFx 1.4.1.0 -> 1.4.2.0) : localiserDansDrive compare
        désormais des SEGMENTS DÉCODÉS des deux côtés (decodeURIComponent segment par segment,
        tolérant à un segment déjà en clair — decoderSegment rend le segment inchangé plutôt que
        de lever ; insensible au trailing slash) ; le résiduel — en clair — est ré-encodé segment
        par segment par encoderChemin avant l'appel root:{chemin}: (espaces, accents, « & »
        correctement ré-encodés). 4 nouveaux tests reproduisant le RÉEL (webUrl drive percent-
