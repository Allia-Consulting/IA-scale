id: T-0002b-5
titre: "MCP Graph : app registration « client » (principe appelant unique) + tokens — runbook humain"
capacite: "Socle d'exploitation / Orchestration des agents"
phase: 1
type_action: runbook_humain
cran: valide
produit:
  - "app registration « client » dédiée = UN SEUL principe appelant, partagé par Claude Code (aujourd'hui) et le batch mémoire (demain)"
  - "obtention des tokens OAuth 2.0 permettant d'appeler /mcp à travers Easy Auth"
depend_de: ["T-0002b-4", "RUNBOOK-HUMAIN"]
# Sous-tâche de la chapeau T-0002b. RUNBOOK HUMAIN → sentinelle RUNBOOK-HUMAIN (proscrites :
#   créer une app registration, configurer l'authentification, obtenir/stocker des tokens).
# Dépend de T-0002b-4 : le client s'authentifie contre l'auth serveur Easy Auth (qui doit exister).
# UN SEUL principe appelant (consigne) : pas un principe par utilisateur — partagé Claude Code + batch mémoire.
contrats_concernes: []
criteres_acceptation:
  - "Une app registration « client » unique existe (principe appelant partagé)"
  - "Des tokens OAuth 2.0 valides permettent d'appeler /mcp ; un appel sans token reçoit 401"
  - "Claude Code aujourd'hui, puis le batch mémoire (T-0005) demain, utilisent CE même principe appelant"
rayon_impact: local
statut: promu
execution: "runbook humain exécuté le 10 juin 2026 (Cloud Shell + portail Entra + terminal local) : app registration « client » allia-mcp-graph-client créée, mono-tenant, avec son service principal — clientId (identifiant PUBLIC) 77aa6010-e3a8-4404-8c34-5f352e0c589a, LE principe appelant unique du canon (partagé Claude Code aujourd'hui / batch mémoire T-0005 demain — pas de principe par utilisateur). Secret client créé (mcp-client-secret, 2 ans — EXPIRE JUIN 2028, même horizon que le secret serveur : UN seul rendez-vous de rotation à anticiper pour les deux), stocké hors dépôt dans le coffre du gardien. Octroi du rôle MCP.Invoke (roleId 929239e9-b73c-40b4-aaea-18419ff52eb3, posé en T-0002b-4 sur l'app serveur) à l'app cliente : az ad app permission add (Cloud Shell), puis CONSENTEMENT ADMIN accordé via le PORTAIL Entra (API permissions → Grant admin consent) — DEUXIÈME occurrence du fait Cloud Shell : az ad app permission admin-consent échoue en MSI (« not a supported MSI token audience ») ; les gestes d'admin Entra passent par le portail. Vérifié : claim roles présent côté octroi. Token OAuth 2.0 obtenu en client credentials PUR CURL (POST login.microsoftonline.com/<tenant>/oauth2/v2.0/token, scope api://0028a5ff-925a-4700-b703-2f2d0ce728fc/.default, grant_type=client_credentials) — aucun CLI requis côté client ; tokens ~1 h de validité (un 401 d'expiration constaté et résolu par régénération — comportement nominal). PREUVES (depuis le poste du gardien) : (1) FACE 2 DE B-4 SOLDÉE — POST /mcp avec bearer du client → HTTP 200, handshake MCP complet (serverInfo allia-graph-proposition) ; combinée au 401 sans token, la porte Easy Auth est prouvée DANS LES DEUX SENS. (2) LECTURE GRAPH — tools/call list_items sur la liste Missions → HTTP 200, isError:false, count:1 (« Projet Siteflow ») : chaîne complète token → Easy Auth → serveur → ManagedIdentityCredential → Graph → site AlliaConsuling, ZÉRO secret côté Graph. (3) ÉCRITURE ZONE-DE-PROPOSITION — tools/call create_list_item ({Title: « Preuve T-0002b — chaîne complète », Origine: « test-gardien »}) → HTTP 200, created_id: 1, champs AppAuthorLookupId/AppEditorLookupId (écriture signée par l'APPLICATION via identité managée, pas par un humain) : « le dérivé n'est jamais le saisi » est désormais porté par l'infrastructure réelle, plus par la simulation. RESTRICTION IP « allow-gardien » LEVÉE (décision du gardien : dès preuves faites) : az containerapp ingress access-restriction remove → [] ; contre-preuve : POST /mcp sans token depuis une IP quelconque → HTTP 401 — la porte du canon (bearer sinon 401) est désormais LA SEULE porte, la configuration transitoire a disparu."
note: >
  Sous-tâche AUTH CLIENT de la chapeau T-0002b. Un seul principe appelant (app registration « client »)
  partagé par tous les consommateurs internes du service (Claude Code, puis batch mémoire T-0005) — pas
  de secret/identité par utilisateur. Runbook humain — créer app, configurer auth, obtenir des tokens
  sont PROSCRITS à un agent et à Claude (garde-fous CLAUDE.md ; plan §2 ; table-des-crans.yaml).
  RÉVISION PROSPECTIVE (stop doctrine 10 juin 2026) : le modèle « un principe appelant unique à
  secret partagé » est remplacé par le modèle d'identités appelantes de
  contrats/socle/identites-et-secrets.md (humains = identité Entra ; workloads = identité managée).
  L'app cliente devient un client PUBLIC (T-0010) et son secret une dette à éteindre (registre §4).
  L'exécution ci-dessus reste la trace exacte de ce qui a été fait et prouvé le 10 juin 2026.
