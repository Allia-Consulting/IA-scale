note: >
  Easy Auth AUTHENTIFIE (le token est valide, émis par le tenant) mais NE VÉRIFIE PAS le claim
  roles — la doc Microsoft est explicite : cette validation revient au code applicatif.
  Aujourd'hui, tout principal du tenant capable d'obtenir un token d'audience
  api://0028a5ff-925a-4700-b703-2f2d0ce728fc passe la porte. Tenant solo : risque faible, accepté
  par le gardien le 10 juin 2026. La défense en profondeur (vérifier MCP.Invoke dans le JWT côté
  server.py) devient NÉCESSAIRE dès que le tenant compte plus d'un humain ou plusieurs apps.
  Contrainte : rouvre outils/mcp-graph/server.py (code promu) — PR dédiée le moment venu, PAS
  maintenant. Échéance indicative : avant l'arrivée des premiers collaborateurs (même logique que
  T-0003). L'app role MCP.Invoke a été posé par T-0002b-4 ; son octroi à l'app cliente relève de
  T-0002b-5. MISE À JOUR (stop doctrine 10 juin 2026) : la validation suit le modèle des identités
  appelantes de contrats/socle/identites-et-secrets.md — claim scp (access_as_user) pour les
  HUMAINS, claim roles (MCP.Invoke) pour les WORKLOADS et la transition ; la JOURNALISATION de
  l'identité appelante (X-MS-CLIENT-PRINCIPAL-*) est la traçabilité par personne décidée le
  10 juin ; la signature des écritures reste APPLICATIVE (OBO non retenu aujourd'hui).

execution: >
  CODE SOLDÉ ET DÉPLOYÉ le 22 juin 2026. Décision du gardien : validation IN-TOOL (pas de
  middleware Starlette — démarrage et Dockerfile inchangés) ; politique FAIL-CLOSED (requête HTTP
  absente, token illisible, ou claim non autorisant => PermissionError). Accès au contexte vérifié
  par sondage réel du SDK (mcp 1.28.0, exploration jetée) : ctx.request_context.request est un
  objet Starlette Request portant .headers ; ctx: Context injecté automatiquement dans la signature
  du tool ; request est Optional (None hors transport HTTP => refus, fail-closed). Voie de lecture
  retenue : X-MS-TOKEN-AAD-ACCESS-TOKEN (JWT brut, indépendant du token store) avec fallback
  X-MS-CLIENT-PRINCIPAL. Implémentation : server.py — fonction _verifier_appelant(ctx) appelée en
  tête de list_items et create_list_item ; valide scp=access_as_user (humains) OU roles=MCP.Invoke
  (workloads, + URI longue gérée) ; journalise X-MS-CLIENT-PRINCIPAL-* (id, name, idp) ; aucune
  dépendance ajoutée (base64/json/logging = stdlib). PR #86 (commit 6ca6c32), CI build-mcp-graph
  VERTE sur ce commit (import réel mcp 1.28.0 + sonde /healthz reprouvés — vérif anti-faux-vert :
  SHA du check = commit candidat). Mergée en HEAD main 8e35791. DÉPLOIEMENT prouvé : image
  acralliamcpgraph.azurecr.io/allia-mcp-graph:0.2.0 (digest
  sha256:2264d3365ddfe4aa0820d7fe38d3635ee9f6495e61cd9e156cc6f9478688f61f) buildée az acr build
  --platform linux/amd64 ; bascule az containerapp update --image (préserve env + probes) ;
  révision ca-allia-mcp-graph--0000003 active/Healthy/trafficWeight 100 ; single revision mode
  (zero-downtime). Rollback en une action : az containerapp revision activate --revision
  ca-allia-mcp-graph--0000002 (ancienne image 0.1.0). PORTE FAIL-CLOSED PROUVÉE VIVANTE EN PROD —
  log applicatif : « appel /mcp — principal_name=adrien.raque@allia-consulting.com idp=aad » suivi
  de « accès refusé — scp='' roles=[] » : la défense en profondeur refuse exactement comme conçue,
  journalise l'identité par personne, et renvoie un message actionnable. RÉSERVE — accès délégué
  non débloqué : ce même log (scp='') révèle que le token émis pour le flux humain n'arrive PAS à
  porter access_as_user malgré consentement Entra accordé et audience Easy Auth correcte ; ce
  déblocage est un sujet DISTINCT du code de validation (qui, lui, est soldé) et fait l'objet du
  chantier T-0015. Runbook humain (build + déploiement Azure) exécuté par le gardien.

cadrage_technique: |
  Cadrage technique (recherche du 16 juin 2026 — doc Microsoft Learn + SDK MCP).
  À LIRE AVANT d'implémenter : évite de refaire l'enquête et de tomber dans les pièges.

  LECTURE DES CLAIMS (frontière d'entrée Easy Auth).
  Le sidecar Easy Auth (Container Apps) injecte les claims du token validé dans des
  EN-TÊTES de requête NON falsifiables de l'extérieur (présents seulement s'ils viennent
  du sidecar — doc Microsoft « Authentication and authorization in Azure Container Apps »
  et « Work with user identities in App Service authentication »). Deux voies :
    - X-MS-CLIENT-PRINCIPAL : JSON base64 des claims, à décoder puis itérer sur le tableau
      « claims » (objets {typ, val}). Voie documentée normale. PIÈGE : mapping de claims par
      défaut — le « typ » de roles peut être mappé vers une URI longue
      (ex. http://schemas.microsoft.com/ws/2008/06/identity/claims/role) au lieu du court
      « roles ». Gérer les deux formes. Le mapping DÉPEND du token store activé.
    - X-MS-TOKEN-AAD-ACCESS-TOKEN : le JWT brut tel qu'émis par Entra (claims roles/scp NON
      mappés, noms stables). À décoder SANS revérifier la signature (le sidecar l'a déjà
      validée) : simple split base64url + JSON, pas de crypto. Plus robuste car indépendant
      du mapping ET du token store.

  FAIT DE DÉPLOIEMENT À VÉRIFIER AVANT DE FIGER L'ARCHI : le token store est-il activé sur
  ca-allia-mcp-graph ? Il n'apparaît PAS dans les traces T-0002b-4 (Easy Auth activé en
  Return401, sans mention de token store). S'il est absent, le mapping de claims peut ne pas
  s'appliquer -> PRÉFÉRER la voie JWT brut (X-MS-TOKEN-AAD-ACCESS-TOKEN), indépendante du
  token store.

  PIÈGE BIBLIOTHÈQUE (hard fact). Deux bibliothèques distinctes s'appellent « FastMCP » :
  le SDK OFFICIEL mcp.server.fastmcp (package « mcp », celui d'outils/mcp-graph —
  requirements.txt: mcp>=1.2.0) et le package TIERS « fastmcp » (jlowin, doc gofastmcp.com).
  Le paramètre mcp.http_app(middleware=[...]) / streamable_http_app(user_middleware=...)
  documenté sur gofastmcp.com appartient au TIERS, PAS au SDK officiel. Ne pas le transposer
  aveuglément -> TypeError. (Même nature que le hard fact host/port constructeur vs run().)

  POUR LE SDK OFFICIEL : insérer un middleware Starlette suppose un MONTAGE STARLETTE EXPLICITE
  — mcp.streamable_http_app() retourné comme app ASGI, monté dans une Starlette parente, EN
  PASSANT LE LIFESPAN de l'app FastMCP à la Starlette parente (les lifespans imbriqués ne sont
  pas reconnus, sinon le session manager n'est pas initialisé). CONSÉQUENCE : le démarrage
  actuel mcp.run(transport="streamable-http") devra CHANGER (montage explicite), ce qui touche
  le bloc __main__ de server.py ET la commande de lancement du Dockerfile. Vérifier aussi que
  @mcp.custom_route("/healthz") survit au remontage.

  DÉCISION D'ARCHITECTURE À TRANCHER AU MOMENT DE FAIRE (non tranchée ici) :
    - middleware Starlette : validation centralisée sur /mcp, /healthz épargné par filtrage de
      chemin — plus propre, mais restructure le démarrage + Dockerfile + lifespan ;
    - validation in-tool : addition pure sans toucher le démarrage, mais rejet au niveau
      JSON-RPC plutôt que 403 HTTP (léger écart au critère « 403 »), dispersé sur chaque tool,
      et suppose que le SDK expose la requête HTTP dans le contexte du tool (à confirmer).

  CONDITION DE RÉALISATION : l'implémentation exige un REDÉPLOIEMENT de la container app et la
  CI build-mcp-graph VERTE (import + sonde /healthz reprouvés). À faire quand un test de
  redéploiement est possible. Risque en tenant solo : faible, accepté (décision du 10 juin) —
  pas d'urgence.
