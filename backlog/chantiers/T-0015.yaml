id: T-0015
titre: "MCP Graph : débloquer l'accès délégué (scp vide dans le token OAuth client)"
capacite: "Socle d'exploitation / Orchestration des agents"
phase: 2
type_action: diagnostic_puis_runbook
cran: valide
produit:
- "le token délégué obtenu par Claude Code (client public PKCE) pour l'audience api://0028a5ff-925a-4700-b703-2f2d0ce728fc porte effectivement scp=access_as_user"
- "l'agent (flux humain délégué) lit la liste Missions via list_items et la porte T-0009 l'autorise (plus de refus scp='')"
depend_de: ["T-0009"]
contrats_concernes:
- "contrats/socle/identites-et-secrets.md"
- "outils/mcp-graph/README.md"
criteres_acceptation:
- "Un appel list_items via Claude Code sous l'identité d'un humain du groupe grp-mcp-graph-users retourne des données (plus de PermissionError scp='')"
- "Le log applicatif montre scp=access_as_user (et non scp='') pour cet appel"
- "Aucun secret introduit ; le flux reste client public PKCE (identites-et-secrets.md cas humain)"
rayon_impact: local
statut: promu
note: >
  SCINDÉ de T-0009 le 22 juin 2026. T-0009 (code de validation + déploiement) est SOLDÉ et sa porte
  fail-closed est prouvée vivante. CE chantier porte le PROBLÈME RÉSIDUEL distinct : le flux humain
  délégué est refusé parce que le token qui atteint server.py a scp='' et roles=[] (log prod du
  22 juin), alors même que tout l'amont a été vérifié correct. La porte fait son travail ; c'est le
  token qui n'est pas conforme.
execution: >
  RÉSOLU ET PROUVÉ EN PROD le 22 juin 2026. Cause racine RÉELLE (différente du diagnostic initial) :
  _verifier_appelant (T-0009) lisait le claim via X-MS-TOKEN-AAD-ACCESS-TOKEN — VIDE car le token
  store Easy Auth n'est PAS activé — puis fallback X-MS-CLIENT-PRINCIPAL (claims remappés, sans scp
  exploitable pour un token délégué). Le token conforme (scp=access_as_user, aud api://0028a5ff-...,
  appid 77aa6010-...) arrivait dans le header Authorization: Bearer, que le code NE LISAIT PAS.
  Entra émettait donc correctement le scp ; le serveur le cherchait au mauvais canal. Correctif :
  PR #88 (commit c617c6a, mergé en main 8e2fc09) — server.py lit Authorization: Bearer en voie 1
  (sans état, zéro secret, zéro token store), fallbacks X-MS-TOKEN-AAD-ACCESS-TOKEN puis
  X-MS-CLIENT-PRINCIPAL conservés ; fail-closed et branche roles=MCP.Invoke intacts. Décision du
  gardien : PAS de token store (éviterait un magasin de jetons utilisateurs et la réouverture d'une
  dette de secret — choix d'échelle 1→200 collaborateurs). DÉPLOIEMENT : image
  acralliamcpgraph.azurecr.io/allia-mcp-graph:0.3.0 (digest
  sha256:d6cfb912528b90c330a18893dc7aace47a7f4f98942ba5b416a52998cb207c90) via az acr build, bascule
  az containerapp update ; révision ca-allia-mcp-graph--0000004 active/Healthy/trafficWeight 100,
  single revision mode. Rollback : az containerapp revision activate --revision
  ca-allia-mcp-graph--0000003 (image 0.2.0). PREUVES : (1) list_items Missions via Claude Code (flux
  humain délégué, identité du gardien) → « Projet Siteflow », count 1 ; (2) log prod « headers
  présents — Authorization=True X-MS-TOKEN-AAD-ACCESS-TOKEN=False X-MS-CLIENT-PRINCIPAL=True » puis
  appel autorisé SANS refus — confirme que c'est bien Authorization: Bearer qui porte le scp. Le flux
  vaut pour tout membre du groupe grp-mcp-graph-users (traçabilité par personne via
  X-MS-CLIENT-PRINCIPAL-NAME journalisé). Log de diagnostic de présence retiré dans la même PR de
  clôture (a fait son office). NB de journal : T-0009 avait été soldé sur une preuve de REFUS
  (fail-closed vivant), jamais sur un PASSAGE humain — ce trou est comblé ici.
post_mortem: >
  La cause réelle n'était PAS la négociation de scope du flux OAuth client public PKCE — le token
  émis par Entra portait bien scp=access_as_user — mais la lecture côté serveur, qui ne regardait pas
  le header Authorization: Bearer. Voir execution: pour le détail, le correctif et les preuves. Valeur
  historique : les pistes initiales (type d'app cliente, redirect URI, négociation de scope) ont été
  écartées par décodage du token réel, qui portait un scp correct.
