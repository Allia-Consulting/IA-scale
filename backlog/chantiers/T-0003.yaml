id: T-0003
titre: "Activer la journalisation M365 sur Ressources-RH et CVs"
capacite: "Corporate & conformité / Gouvernance IA responsable"
phase: 1
type_action: runbook_humain
cran: valide
produit:
  - "journal d'audit M365 actif sur la liste Ressources-RH (site AlliaConsuling)"
  - "journal d'audit M365 actif sur la bibliothèque CVs (site AlliaConsuling)"
  - "vérification que chaque accès agent est tracé et consultable"
depend_de: ["RUNBOOK-HUMAIN"]
# RUNBOOK-HUMAIN : sentinelle de garde-fou (P3.8). Identifiant de dépendance RÉSERVÉ, sans
#   fichier chantiers/*.yaml correspondant : son statut ne peut donc jamais être « promu ».
#   Par la règle du plan §4 (« un agent ne traite que des tâches dont les deps sont promu »),
#   cette tâche devient mécaniquement NON sélectionnable en autonomie par un agent — ce qui est
#   l'intention, puisqu'« activer la journalisation d'audit M365 » est une action proscrite
#   (table-des-crans.yaml : parametrer_tenant_m365_securite_residence_donnees). Voir T-0002a pour
#   la convention de sentinelle (tâche runbook). La sentinelle rend la tâche non
#   sélectionnable par un agent (à faire par le gardien) ; le statut réel est « promu » depuis
#   l'exécution du runbook le 19 juin 2026 (journalisation activée + captation prouvée — voir execution:).
contrats_concernes:
  - "contrats/socle/modele-donnees.md"
  - "contrats/socle/anonymisation.md"
criteres_acceptation:
  - "Le journal d'audit SharePoint est activé sur Ressources-RH"
  - "Le journal d'audit SharePoint est activé sur la bibliothèque CVs"
  - "Un accès test agent est visible dans le journal dans les 24h"
echeance: "avant arrivée des premiers collaborateurs"
rayon_impact: local
statut: promu
execution: >
  Aligné le 19 juin 2026 : journalisation d'audit unifié M365 ACTIVÉE par le gardien
  (UnifiedAuditLogIngestionEnabled = True) et CAPTATION PROUVÉE (recherche d'audit retournant des
  événements réels, dont une opération sur la liste Candidats). Le prérequis « journalisation
  active avant accès agent réel » (modele-donnees.md section 2 bis / section 4) est levé. Runbook
  humain ; aucune règle modifiée.
note: "Décision du gardien : agents autorisés en lecture sur Ressources-RH et CVs. Contrepartie RGPD obligatoire avant accès réel. Runbook humain — ni Claude ni un agent ne configurent les journaux d'audit M365."
