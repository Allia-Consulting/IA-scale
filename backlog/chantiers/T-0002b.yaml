id: T-0002b
titre: "Serveur MCP Graph : déploiement & écriture réelle"
capacite: "Socle d'exploitation / Orchestration des agents"
phase: 1
type_action: infrastructure_mcp
cran: valide
produit:
  - "déploiement du serveur MCP Graph (code existant : outils/mcp-graph/) sur un hébergement Azure (événementiel)"
  - "écriture réelle dans la Liste « Zone-de-proposition » via Graph Lists API"
  - "mise à jour de modele-donnees.md avec les endpoints/identifiants réels (APRÈS déploiement)"
depend_de: ["T-0002a", "T-0003"]
# T-0002a : le runbook Entra (app/secret/octroi write) doit précéder toute écriture réelle.
# T-0003  : la journalisation RH/CVs doit être active avant tout accès agent à M365.
# (Conserve la logique de l'ancien T-0002, dont la dépendance était déjà T-0003 ; l'ancienne
#  référence « A0.7 » avait été corrigée en T-0003 en amont.) T-0003 portant la sentinelle
#  RUNBOOK-HUMAIN, cette tâche n'est de toute façon pas sélectionnable en autonomie tant que
#  T-0003 n'est pas promu.
contrats_concernes:
  - "contrats/socle/modele-donnees.md"
criteres_acceptation:
  - "Le serveur MCP est déployé et joignable (hébergement Azure), sans dépendre du poste du fondateur"
  - "L'agent lit la liste Missions via Graph et liste les éléments réels"
  - "L'agent crée un item dans Zone-de-proposition sans toucher les sources"
  - "modele-donnees.md est mis à jour avec les endpoints réels après déploiement"
rayon_impact: local
statut: à_faire
note: >
  Issu du découpage de l'ancien T-0002 (cette tâche = la partie CODE/DÉPLOIEMENT). Le code MCP
  est DÉJÀ ÉCRIT (outils/mcp-graph/ : list_items + create_list_item, garde-fou d'écriture en
  zone de proposition) mais NON DÉPLOYÉ. Le chantier principal restant est l'HÉBERGEMENT AZURE
  (événementiel, qui tourne sans le poste du fondateur — voir architecture.md Partie B.4) ;
  cette part est un runbook humain. En attendant le déploiement, la zone de proposition reste
  SIMULÉE EN LOCAL (zone-proposition/). La mise à jour des endpoints réels dans modele-donnees.md
  se fait APRÈS déploiement.
