id: T-0019
titre: "Réconciliateur de droits : décision promue → groupes Entra (le guide → Claude → M365)"
capacite: "Socle d'exploitation / Adoption multi-utilisateurs (RBAC)"
phase: 1
type_action: infrastructure_mcp
cran: valide
produit:
  - "réconciliateur au moindre privilège qui projette la DÉCISION de délégation promue (organisation.md §3, §5) sur les groupes Entra de périmètre, en idempotent (n'applique que le delta)"
  - "parallèle au réconciliateur de PARC (T-0008) : même chaîne le guide → Claude → M365, appliquée aux DROITS d'accès au lieu des appareils"
  - "ressources SharePoint/Teams liées au GROUPE de périmètre (ex. anim-communication), jamais aux individus"
depend_de: []  # prérequis normatif (organisation.md promu v1.7, §5 chaîne d'autorité des droits) satisfait — vérifié 27 juin 2026
# Éclaté en chantier réel le 27 juin 2026 (était plan §9 T-4.3, Phase 4, non éclaté). Jumeau de T-0008
# pour les DROITS. La mise en place du privilège du réconciliateur (app registration au moindre
# privilège — ne sait gérer QUE ces groupes —, consentement admin, secret) reste un RUNBOOK HUMAIN
# (organisation.md §5, plan §2), jamais un agent ni Claude.
contrats_concernes:
  - "contrats/socle/organisation.md"
criteres_acceptation:
  - "Le réconciliateur lit la décision de délégation promue (le canon) et fait correspondre l'appartenance au groupe Entra du périmètre, en idempotent (delta seul)"
  - "Au moindre privilège : l'app registration ne sait gérer QUE les groupes de périmètre, rien d'autre ; tout changement tracé"
  - "Les ressources SharePoint/Teams sont liées au groupe, jamais aux individus ; attribuer = ajouter au groupe, révoquer = retirer (retour arrière en une action)"
  - "La porte humaine reste à la PROMOTION du contrat ; aucun droit ne change hors de la chaîne le guide → Claude → M365"
  - "Aucun droit n'est saisi à la main : tout est dérivé d'une décision promue (le dérivé n'est jamais le saisi)"
rayon_impact: large
statut: soldé # éprouvé sur le réel le 2026-06-27 (épreuve B.5) ; vérifié à la source par le gardien
note: >
  Réconciliateur de DROITS — jumeau de T-0008 (parc) pour la chaîne d'autorité des accès.
  Éclaté en chantier réel le 27 juin 2026, dans le même mouvement que le réordonnancement de T-0008
  et la remise en phase active de T-0007 (onboarding chapeau). Auparavant nommé en prose seulement
  (plan §9 T-4.3, organisation.md §5), sans fichier de chantier. Concrétise le §5 d'organisation.md :
  la décision de délégation (le guide, Git) est la source ; les droits M365 en sont la projection
  réconciliée au moindre privilège, en idempotent, jamais éditée à la main. C'est la JAMBE DROITS
  dont dépend l'onboarding chapeau (T-0007) ; sans elle, T-0007 reste une demi-fondation.
  Runbook humain (ni Claude ni agent) : créer l'app registration, donner le consentement admin,
  stocker le secret (organisation.md §5).

avancement:
  journal:
    - date: 2026-06-27
      fait: "Chantier éclaté du plan §9 T-4.3 vers un fichier réel, phase active, dans le mouvement de réordonnancement du Bloc A (firme plus solo, T-0006 soldé le 26 juin)."
    - date: 2026-06-27
      fait: >
        ÉPROUVÉ SUR LE RÉEL — T-0019 soldé. Réconciliateur construit comme 4e outil MCP
        reconcilier_groupe_perimetre (PR #111, image 0.5.0, révision ca-allia-mcp-graph--0000008).
        Épreuve B.5 : ajout réel de Sarah Shaiek (9eeb5c81-…) sur le groupe de périmètre
        anim-communication (8c7e9602-…) par projection de la décision promue (organisation.md §3),
        SANS saisie manuelle ; idempotence (rejeu = delta vide) ; borne liste blanche
        (group_id hors périmètre refusé, PermissionError) ; retour arrière (état désiré vide = retrait) ;
        état final conforme au canon. Vérifié À LA SOURCE (Entra) par le gardien : Sarah membre.
      decision_gardien: >
        PRIVILÈGE = OPTION 1, IDENTITÉ MANAGÉE ZÉRO-SECRET (divergence assumée vs lettre §5
        « app registration + secret »). Le moindre privilège est atteint AUTREMENT : rôle Entra
        « Administrateur de groupes » assigné au service principal de l'identité managée id-allia-mcp-graph,
        SCOPÉ à l'Administrative Unit au-perimetres-droits (b2fe4a22-…) qui ne contient que les groupes
        de périmètre ; PLUS une liste blanche figée côté serveur (GRAPH_GROUPES_PERIMETRE_AUTORISES) en
        défense en profondeur. Cohérent avec la doctrine zéro-token-store du MCP (T-0015) : aucun secret
        créé, distribué ni stocké. Les critères_acceptation d'origine mentionnant « app registration / secret »
        restent inchangés (historique immuable) ; ils sont satisfaits dans leur INTENTION (moindre privilège,
        traçabilité, porte humaine à la promotion) par ce moyen décidé par le gardien.
  reste_pour_solder: [] # soldé le 2026-06-27 — rien ne reste. (Runbook réel : MI zéro-secret + rôle scopé AU, PAS app+secret — voir journal/decision_gardien.)
