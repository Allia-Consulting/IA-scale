id: T-0007
titre: "Onboarding & intégration : capacité chapeau (3 réconciliations d'une décision promue)"
capacite: "Capacités habilitantes / Onboarding & intégration"
phase: 1
type_action: infrastructure_mcp
cran: valide
produit:
  - "capacité chapeau orchestrant, pour une décision promue « X devient collaborateur du périmètre P », trois réconciliations d'une même vérité :"
  - "  - matériel : parc (ABM/Intune) — voir parc-collaborateur.md / réconciliateur T-0008"
  - "  - droits : Entra/SSO — via le réconciliateur de droits (organisation.md §5 ; plan §9 T-4.3)"
  - "  - connaissance : Claude/Git — accès au canon et à la mémoire d'organisation"
  - "déclencheur : passage candidat → collaborateur (création de l'identité Entra)"
depend_de: ["T-0008", "T-0019"]  # parc (T-0008) ET droits (T-0019) désormais éclatés en chantiers actifs — 27 juin 2026
# Onboarding compose des réconciliateurs qui doivent exister d'abord :
#   - matériel : réconciliateur politique→Intune = T-0008 (Phase 3/4) ;
#   - droits   : réconciliateur de droits = plan §9 T-4.3 (Phase 4) — pas encore éclaté en chantier.
# Tant que ces réconciliateurs ne sont pas promus, l'onboarding ne peut pas être bâti de bout en bout.
# NON couplé à T-0003 ni à la liste de recrutement (voir note).
contrats_concernes:
  - "contrats/socle/organisation.md"
  - "contrats/socle/parc-collaborateur.md"
  - "contrats/socle/rgpd-ecoute-teams.md"
criteres_acceptation:
  - "Une décision promue « X devient collaborateur de P » déclenche les trois réconciliations sans saisie manuelle de droit ni de config"
  - "Le déclencheur est le passage candidat → collaborateur (création identité Entra), PAS l'entrée en liste de recrutement"
  - "Chaque réconciliation est au moindre privilège et tracée ; retour arrière par repointage"
  - "CONTRAINTE D'ORDONNANCEMENT RGPD : l'information préalable « mémoire d'organisation » est délivrée AVANT l'activation de l'écoute Teams/Claude du collaborateur — étape qui PRÉCÈDE l'écoute dans la séquence, pas une case de fin de parcours (cadre rgpd-ecoute-teams.md §5)"
rayon_impact: large
statut: soldé # éprouvé sur le réel le 2026-06-28 (épreuve 4 étapes + enrôlement gardien, vérifié à la source Entra par le gardien)
note: >
  Capacité ajoutée à la carte (organisation.md §2, v1.2). C'est une capacité CHAPEAU : elle
  n'invente pas de nouveau pouvoir, elle ORCHESTRE trois réconciliations d'une même décision
  déjà promue (matériel / droits / connaissance). DÉCOUPLAGE VOLONTAIRE : la liste de recrutement
  reste un PROCESSUS HUMAIN, non couplée à cette capacité ni à T-0003 — on évite de coupler
  l'onboarding à la lecture RH (T-0003) et au pipeline de recrutement. Le déclencheur est strictement
  le passage candidat → collaborateur (création de l'identité Entra). Phase 4 : dépend des
  réconciliateurs (parc T-0008 ; droits plan §9 T-4.3) qui n'existent pas encore.
  RGPD — INFORMATION MÉMOIRE AVANT ÉCOUTE : l'onboarding porte l'information préalable obligatoire
  des personnes sur l'écoute Teams/Claude de la mémoire d'organisation. C'est une CONTRAINTE
  D'ORDONNANCEMENT : l'information PRÉCÈDE l'activation de l'écoute (pas d'écoute d'un collaborateur
  non informé), ce n'est pas une case de fin de parcours. Cadre : contrats/socle/rgpd-ecoute-teams.md
  (§5 transparence). Firme solo aujourd'hui : rien à exécuter, obligation posée comme déclencheur.

# --- ORDONNANCEMENT (gardien, 27 juin 2026) ---
# Remis en PHASE ACTIVE (phase 1, statut en_cours) dans le mouvement de réordonnancement du Bloc A.
# Les DEUX réconciliateurs dont dépend l'onboarding chapeau sont désormais des chantiers actifs :
#   - matériel/parc : T-0008 (réordonnancé en phase active) ;
#   - droits        : T-0019 (éclaté du plan §9 T-4.3 en chantier réel).
# La dépendance droits, jusqu'ici nommée en prose seulement, est maintenant ordonnancée :
# T-0007 n'est plus bloqué sur une jambe manquante. Reste la construction effective des deux
# réconciliateurs avant que l'onboarding chapeau puisse être bâti puis éprouvé de bout en bout.
# Rappel RGPD inchangé : information « mémoire d'organisation » AVANT activation de l'écoute (rgpd-ecoute-teams.md §5).

avancement:
  journal:
    - date: 2026-06-28
      fait: >
        SOLDÉ — éprouvé sur le réel. Skill chapeau skills/onboarding/SKILL.md (candidat promu, PR #122)
        orchestrant les réconciliateurs existants : matériel via reconcilier_groupe_parc (T-0008, soldé),
        droits via reconcilier_groupe_perimetre (T-0019, soldé). Outil de lecture lire_annuaire ajouté
        (PR #123, image 0.7.0 / révision ca-allia-mcp-graph--0000010) pour résoudre les objectId et lire
        l'appartenance réelle SANS muter (les réconciliateurs n'ont pas de dry-run). Prérequis runbook
        posés : rôle Entra « Directory Readers » sur l'identité managée (lecture annuaire) ; annexe 3 RGPD
        promue (PR #121, gabarit d'information préalable). Épreuve 4 étapes sur cas réel Sarah +
        enrôlement réel du poste du gardien Adrien :
        (1) enrôlement gardien — reconcilier_groupe_parc → ajoutes=[Adrien], état final {Sarah, Adrien} ;
        (2) idempotence composée — rejeu parc ET périmètre = delta vide ;
        (3) ajout/retrait borné — périmètre vidé puis Sarah remise (retour arrière en une action) ;
        (4) borne liste blanche — group_id non déclaré → PermissionError, zéro écriture.
        Jambes connaissance (org GitHub) + licence M365 (grp-collaborateurs-m365) signalées en runbook
        humain, NON exécutées par l'agent. Vérifié À LA SOURCE (Entra) par le gardien :
        grp-parc-collaborateur = {Sarah, Adrien}, anim-communication = {Sarah}.
    - date: 2026-06-28
      note_balayage_post_solde: >
        Balayage post-solde (plan §4) : les références à T-0007 dans organisation.md §2 (description de
        la capacité chapeau) et rgpd-ecoute-teams.md §5 (vecteur d'information, contrainte d'ordonnancement)
        sont des descriptions de capacité et des liens de dépendance, NON des lignes de statut affirmant
        « onboarding reste à construire ». Aucune n'est rendue fausse par le solde. Balayage minimal,
        limité à ce fichier. (Décision tracée, non un oubli.)
    - date: 2026-06-30
      fait: >
        Jambe LICENCE M365 refermée — runbook humain du gardien exécuté le 2026-06-30. Au solde du
        2026-06-28, la jambe licence (grp-collaborateurs-m365) restait explicitement « signalée en
        runbook humain, NON exécutée par l'agent ». Ce runbook est désormais fait, à la main par le
        gardien dans Entra + Centre d'administration M365 (aucun agent, aucune écriture Claude).
        Constat à la source AVANT correction : grp-collaborateurs-m365 = {Sarah} seule ; Adrien et
        Guillaume portaient M365 Business Premium en affectation DIRECTE (hors canal canonique), donc
        fonctionnels mais non gouvernés par le groupe. Décision d'architecture : canoniser le
        group-based licensing — le groupe grp-collaborateurs-m365 (porteur de M365 Business Premium,
        53/53) est l'unique canal d'attribution ; l'affectation directe est une dette qui ne passe pas
        à l'échelle 1→200 et contredit « ressources liées aux groupes, jamais aux individus »
        (organisation.md §5). Manœuvre sans coupure : (1) ajout d'Adrien et Guillaume au groupe →
        (2) vérification de l'héritage « Direct, Hérité (grp-collaborateurs-m365) » sur les deux fiches →
        (3) retrait des affectations directes au Centre d'administration M365. État final VÉRIFIÉ À LA
        SOURCE (Entra) : les trois (Adrien, Guillaume, Sarah) portent M365 Business Premium, Active 53/53,
        chemin « Hérité (grp-collaborateurs-m365) » seul, zéro affectation directe résiduelle, zéro coupure.
        Lève la friction d'intégrité « jambe licence onboarding ». N'altère pas le statut soldé de T-0007 :
        referme une dette de runbook qui y était nommée.
