id: T-0013-d
titre: "Purge automatique des données de recrutement — mécanisme gouverné au moindre privilège"
capacite: "Capacités habilitantes / Talent & RH — Recrutement"
phase: 4
type_action: infrastructure_mcp
cran: valide
produit:
  - "mécanisme de purge AUTOMATIQUE, au MOINDRE PRIVILÈGE : il ne sait QUE supprimer les données de recrutement échues selon les durées promues, et rien d'autre"
  - "règle unique : purge des fiches à l'étape « Refusée » dont la date d'inscription (colonne native « Créé le », modele-donnees.md) remonte à plus de 2 ans — durée promue (rgpd-recrutement-candidats.md §5) ; horloge FIXE depuis l'inscription, non glissante (un recontact ne la prolonge pas) ; sauf opposition de la personne"
  - "traçabilité : chaque purge est journalisée (quoi, quand, sur quelle règle de durée)"
  - "(runbook humain) mise en place du privilège du mécanisme (identité/octrois Graph de suppression au moindre privilège) — jamais un agent"
depend_de: ["T-0013-a", "T-0013-c"]
# Sous-tâche de la chapeau T-0013, désormais constructible : a (modèle de données) et c
# (synthèses) sont promues ; le prérequis vivier (annexe 1 mise en balance) est promu.
# AUTORISATION DE CRAN : ce mécanisme franchit le proscrit supprimer_definitivement_des_donnees ;
# il n'est légitime QUE par l'EXCEPTION GOUVERNÉE « purge » inscrite dans table-des-crans.yaml
# v1.6 (même PR). Sans cette exception, l'agent-gardien doit rejeter — c'est voulu.
contrats_concernes:
  - "contrats/socle/rgpd-recrutement-candidats.md"
  - "contrats/socle/table-des-crans.yaml"
  - "contrats/socle/modele-donnees.md"
  - "contrats/socle/recrutement-pipeline.md"
criteres_acceptation:
  - "La purge est un MÉCANISME outillé, pas un geste manuel (cadre §5 : « la purge est un mécanisme, pas une intention »)"
  - "Au moindre privilège : il ne supprime QUE les données de recrutement échues selon les durées promues ; aucune autre donnée, aucune autre liste"
  - "Règle unique : purge des fiches « Refusée » dont « Créé le » > 2 ans (horloge fixe depuis l'inscription, non glissante ; sauf opposition) — durée promue (cadre §5)"
  - "Nouvelle candidature = nouvelle fiche = nouvelle horloge ; aucune prolongation d'une fiche existante"
  - "Chaque purge est tracée ; la suppression est l'application d'une durée promue, jamais une décision d'agent"
  - "L'exception gouvernée « purge » est inscrite dans table-des-crans.yaml (même PR) — sans elle le mécanisme contredirait les proscrites"
  - "La mise en place du privilège (octrois Graph de suppression) est un runbook humain ; ni Claude ni un agent ne l'exécutent"
rayon_impact: large
statut: en_cours # skill promu v1.1 + code + privilège posés ; reste la 1re purge réelle
note: >
  Dernier morceau de la chapeau T-0013. Point le plus sensible RGPD : la SUPPRESSION
  définitive. RÉSOLUTION DE LA TENSION avec le proscrit supprimer_definitivement_des_donnees :
  la purge est un MÉCANISME GOUVERNÉ au moindre privilège, sur le modèle EXACT de la
  réconciliation de droits (organisation.md §5) — il applique une durée DÉJÀ PROMUE
  (rgpd-recrutement-candidats.md §5 : 2 ans depuis l'inscription), il ne supprime jamais librement. Cette autorisation est
  portée par l'exception inscrite dans table-des-crans.yaml v1.6 (même PR). La mise en place de
  son privilège (identité, octrois Graph de suppression) reste un RUNBOOK HUMAIN. CONSTRUIT ET PROMU AU CANON : skill purge-recrutement v1.1 promu (22 juin 2026) ;
  code outils/purge-recrutement/purge.py présent ; runbooks de privilège posés le 19 juin 2026
  (colonne OppositionVivier sur liste Candidats + identité managée id-allia-purge-recrutement
  Sites.Selected/write + journalisation T-0003 active). RESTE POUR SOLDER : première purge
  réelle éprouvée sur la vraie donnée (aucun candidat éligible à ce jour ; rapport en
  Zone-de-proposition à produire au premier passage).
