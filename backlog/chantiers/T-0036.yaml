    - date: 2026-07-15
      fait: "Soirée d'exécution complète. VOIE TECHNIQUE tranchée : aucune clé d'emplacement parmi les 9 clés entreprise (com.anthropic.claudefordesktop) — abandon du recours à l'app LOB au profit d'un script shell Intune root (pattern socle-cli-collaborateur) : extraction du payload du .pkg officiel (pkgutil --expand-full), dépôt en ~/Applications propriété de l'utilisateur console (ditto+chown), suppression de la copie /Applications (absorbe l'anti-doublons), idempotent. Créés dans Intune : script socle-claude-desktop-userapps v1.0 + attribut personnalisé telemetrie-claude-desktop-version v1.0 (ok:/anomalie:double-installation/anomalie:emplacement-systeme/absent). INCIDENT de séquence : script d'abord affecté à grp-parc-collaborateur entier sans pilote ; détecté le soir même, affectation retirée, État de l'appareil vide = zéro exécution, sans impact. ÉCART réel/canon découvert PUIS RÉSORBÉ : le Mac du gardien n'était pas enrôlé (DEP No, MDM No) alors que la politique dit gardien inclus — enrôlé le soir même (User Approved, Portail d'entreprise) ; constat : grp-parc-collaborateur est un groupe d'UTILISATEURS (4 membres dont le gardien). ARBITRAGE GARDIEN : pilote formel abandonné (parc de 4, script idempotent, le poste gardien fait pilote de facto par timing de sync) ; app LOB Claude Desktop DÉSAFFECTÉE de grp-parc-collaborateur (conservée dans Intune non affectée = voie de réversibilité v1.4 §4) ; script affecté à grp-parc-collaborateur. ÉTAT fin de soirée : agent Intune sain sur le poste gardien (label durable : com.microsoft.intuneMDMAgent.daemon), attribut télémétrie exécuté (terminationStatus=0), mais réponse serveur shellScript Count:0 = propagation de l'affectation en cours côté service ; AUCUNE migration constatée encore sur aucun poste. Le cycle agent (8h) livrera ; la télémétrie cartographie les 4 postes. Fait outillage durable : blades Intune/Entra = iframes cross-origin (reactblade.portal.azure.net) illisibles par l'extension ; menus top-frame lisibles ; lectures de grilles = yeux du gardien."
    - date: 2026-07-16
      fait: >
        Épreuve S36. Diagnostic : le script v1.0 échouait au curl du .pkg — endpoint public
        protégé par challenge Cloudflare (HTTP 403 + en-tête cf-mitigated: challenge, avant
        toute redirection, HEAD comme GET, avec/sans User-Agent). Correctif v1.1 : suppression
        du téléchargement runtime, script réduit à migration LOCALE /Applications -> ~/Applications
        + nettoyage anti-doublon + télémétrie, ZÉRO réseau ; .sh versionné au canon
        (contrats/socle/scripts/socle-claude-desktop-userapps.sh) via PR #220 mergée (HEAD 991a4f00).
        CAUSE RACINE du non-rejeu après upload : fréquence du script Intune « non configuré »
        (one-shot) — les 3 postes étaient figés au résultat du v1.0 (curl 403) d'hier. Correction :
        fréquence passée à 1h le temps de l'épreuve, puis « chaque jour » en régime permanent.
        ÉPREUVE RÉUSSIE sur le poste gardien : État de l'appareil = Réussi,
        « ok:1.21459.0 (emplacement-utilisateur, /Applications propre) ». Migration + nettoyage
