      - "pose de GRAPH_MISSION_DRIVE_ID + GRAPH_MISSION_FOLDER_ID sur ca-allia-mcp-graph (az containerapp update — valeurs en SIMPLES QUOTES, leçon T-0017-b : « b! » corrompu par l'expansion d'historique bash) ; rebuild image + redéploiement"
      - "vérification de l'octroi write (Sites.Selected) sur le site AlliaConsuling par écriture réelle ; création des Listes « Missions » / « Imputations » au tenant si absentes (modele-donnees §2 bis — partiellement câblé)"
    depend_de: ["T-0024-a"]
    criteres_acceptation:
      - "Les ids pointent la racine Missions réelle et sont posés sur le service ; révision saine, trafic 100%"
      - "Octroi write PROUVÉ par écriture réelle (pas une hypothèse) ; ressources liées aux groupes, jamais aux individus"
      - "Aucun droit posé à la main par un agent (proscrit) ; gestes du gardien uniquement"
    execution: >
      Runbook exécuté le 02/07/2026 (Cloud Shell piloté via Claude in Chrome, identité et
      validations du gardien à chaque effet de bord). Racine désignée = dossier EXISTANT
      « General/03 - Livrables de mission » (arbitrage gardien ; objection de cohérence posée
      deux fois et levée). Ids résolus par le connecteur M365 et posés en SIMPLES QUOTES
      (leçon T-0017-b — préfixe b! vérifié intact à la source) : drive
      b!tZYcCkb3skypJksq51PmeGcU1gFxR9dGqWotV3wGr_vChScRuaLbTblJozaxk02B, folder
      01OFZO2MRZDMNUBFY7S5HY3RKN64HD33P2. Images ACR : 0.8.0 (Run dd9, 40 s) puis 0.8.1
      (Run dda, 39 s). Révision finale ca-allia-mcp-graph--0000012 = latest+ready,
      RunningAtMaxScale / Healthy / trafic 100 %, image 0.8.1, variables historiques préservées.
      OCTROI WRITE PROUVÉ par écritures réelles : « 2026 - Test - T0024C » (0.8.0, collision=fail
      rejouée) puis « 2026 - Test - T0024C-v2 » (0.8.1, arbre EXACT [01 - Pilotage, 02 - Livrables],
      collision=fail rejouée) ; les deux dossiers de test supprimés à la main par le gardien
      (suppression = geste humain, proscrite à l'agent). RESTE hors c : vérifier/créer les
      Listes « Missions » / « Imputations » au tenant avant la promotion tracée de l'épreuve d.

  - id: T-0024-d
    titre: "Épreuve réelle — la tranche verticale de bout en bout sur une affaire étiquetée"
    type_action: epreuve_reelle
    cran: valide  # portes des skills respectées, validations gardien aux étapes prévues
    produit:
      - "agent-mission déroule cadrage-mission (brief en Zone-de-proposition via create_list_item, porte « le brief suffit ») puis kick-off (documents déposés via deposer_document_mission) sur une affaire réelle ou de démonstration EXPLICITEMENT étiquetée (ex. M-DEMO-001) ; espace créé via creer_espace_mission ; notification équipe"
      - "SOLDE de T-0021, T-0022, T-0023 et T-0024 (exécution réelle sur donnée tenant) ; imputations dérivées en zone, promotion tracée par le gardien"
    depend_de: ["T-0024-b", "T-0024-c"]
    criteres_acceptation:
      - "Chaque action a respecté son cran ; tout dérivé est passé par la Zone-de-proposition ; rien d'envoyé hors firme"
      - "Critère de sortie plan §6 satisfait et tracé dans les journaux des quatre chantiers"
    execution: >
      Épreuve déroulée le 02/07/2026 sur l'affaire RÉELLE Projet Siteflow / Arabelle Solutions
      (CodeMission 1) — au-delà du critère (qui admettait une démonstration étiquetée).
      Chaîne complète : fiche lue à la source → brief en dialogue → porte « le brief suffit »
      (gardien) → BRIEF-1 en Zone-de-proposition (id=4) → espace réel « 2026 - Arabelle
      Solutions - Siteflow » (01 - Pilotage / 02 - Livrables) → support kick-off au design
      system v1.2 (16758 o, sha256 9121af57…) → journal KICKOFF-1-20260702 (id=5) →
      notification remise au gardien (Teams non outillé) → imputations promues vers la Liste
      Imputations par le gardien. INCIDENT FONDATEUR : 1er dépôt (0.8.0) corrompu en transit
      et stocké silencieusement (17307 ≠ 16758, détecté par taille_octets, retiré par le
      gardien) → durcissement 0.8.2 (sha256_attendu fail-closed, PR #150) → à la reprise,
      3 corruptions de transit REFUSÉES avant écriture : garde-fou prouvé vivant. RÉSERVES
      tracées non bloquantes : dépôt binaire via UI gardien (base64 inline non fiable) ;
      notification Teams manuelle. Traces vérifiées à la source (Zone-de-proposition, espace).

