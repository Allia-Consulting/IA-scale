# Agent-gardien CI v1 — doctrine §3. Impact FIN déterministe (T-0020-c marche 1).
#
# Tête-agent du gardien : sur chaque PR, produit un AVIS D'IMPACT et le poste en
# commentaire. Il CALCULE l'impact (rayon + risque) de façon DÉTERMINISTE sur les
# consommateurs réels — plus de grep fruste — puis confie au LLM le SEUL jugement
# de casse SÉMANTIQUE des contrats consommateurs (il ne recalcule pas le rayon).
# Il FILTRE, il N'APPROUVE PAS (l'auto-approbation du faible risque = marche 2,
# T-2.4, non incluse ici) et ne merge JAMAIS — la promotion reste la porte humaine.
name: Agent-gardien — conformité (v0)

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Le strict nécessaire : commenter la PR, lire le code. Aucun droit d'écriture sur le contenu.
permissions:
  pull-requests: write
  contents: read

jobs:
  conformite:
    name: Avis d'impact          # NE PAS renommer — check requis au ruleset main-protection.
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # gh CLI est natif sur les runners GitHub
    steps:
      # (1) Checkout complet — l'index entier sert au calcul des consommateurs.
      - name: Checkout complet
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Python + PyYAML : seul prérequis du calcul déterministe (aucune clé requise).
      - name: Préparer Python + PyYAML
        run: |
          python3 --version
          python3 -m pip install --quiet pyyaml

      # Détecter la clé API SANS jamais l'exposer. Si absente : on avertira et on sortira proprement.
      - name: Détecter la présence de la clé API
        id: key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      # (2) Récupérer la liste des fichiers modifiés dans la PR (via gh, GITHUB_TOKEN).
      - name: Lister les fichiers modifiés
        run: |
          gh pr view "$PR_NUMBER" --json files --jq '.files[].path' > changed-files.txt
          echo "Fichiers modifiés :"
          cat changed-files.txt

      # (3) CALCUL D'IMPACT DÉTERMINISTE — rayon + RISQUE + casse structurelle.
      #     Ne dépend d'aucune clé : il tourne TOUJOURS. C'est le cœur de la marche 1.
      - name: Calculer l'impact déterministe
        id: impact
        run: |
          python3 outils/agent-gardien/impact.py --changed $(cat changed-files.txt) > impact.md
          python3 outils/agent-gardien/impact.py --changed $(cat changed-files.txt) --json > impact.json
          echo "----- Rapport d'impact déterministe -----"; cat impact.md; echo "-----------------------------------------"
          # Extraire rayon global (RISQUE) et casse structurelle pour le verdict combiné.
          RISQUE=$(python3 -c "import json;print(json.load(open('impact.json'))['risque'])")
          CASSE=$(python3 -c "import json;print(str(json.load(open('impact.json'))['casse_structurelle']).lower())")
          echo "risque=$RISQUE" >> "$GITHUB_OUTPUT"
          echo "casse_structurelle=$CASSE" >> "$GITHUB_OUTPUT"

      # Garde-fou de configuration : clé absente => avertir, NE PAS bloquer la PR (job en succès).
      # On poste tout de même l'impact déterministe (bonus), mais on n'exige pas le jugement LLM.
      - name: Avertir si la clé API est absente (sortie propre)
        if: steps.key.outputs.present == 'false'
        run: |
          {
            echo "## 🛡️ Agent-gardien (marche 1) — impact déterministe, jugement sémantique non produit"
            echo ""
            echo "⚠️ Le secret \`ANTHROPIC_API_KEY\` n'est pas configuré : le **jugement de casse sémantique** (LLM) n'a pas pu être produit. Le **calcul d'impact déterministe** ci-dessous, lui, est disponible."
            echo ""
            echo "Ceci **ne bloque pas** la PR : c'est un problème de **configuration**, pas de conformité. Pour l'activer : *Settings → Secrets and variables → Actions → New repository secret* (\`ANTHROPIC_API_KEY\`)."
            echo ""
            cat impact.md
          } > comment.md
          gh pr comment "$PR_NUMBER" --body-file comment.md
          echo "::warning::ANTHROPIC_API_KEY absente — jugement sémantique non produit, PR non bloquée."

      # (4) Installer Claude Code via le script officiel (seulement si la clé est présente).
      - name: Installer Claude Code
        if: steps.key.outputs.present == 'true'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          # Le native installer dépose le binaire dans ~/.local/bin
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Vérifier l'installation
        if: steps.key.outputs.present == 'true'
        run: claude --version

      # (5) JUGEMENT DE CASSE SÉMANTIQUE (LLM) — rôle BORNÉ : il ne recalcule PAS le
      #     rayon (déjà déterministe). Il lit le diff des contrats consommateurs et dit
      #     si le changement CASSE une attente d'un consommateur. Rédaction courte.
      - name: Juger la casse sémantique (Claude Code non-interactif)
        if: steps.key.outputs.present == 'true'
        id: avis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          {
            echo "Tu es la tête-agent du gardien (doctrine §3). Le RAYON et le RISQUE sont DÉJÀ"
            echo "calculés de façon déterministe (rapport ci-dessous) — NE LES RECALCULE PAS."
            echo "Ton SEUL rôle : juger la CASSE SÉMANTIQUE des contrats consommateurs."
            echo ""
            echo "Fichiers modifiés :"
            sed 's/^/- /' changed-files.txt
            echo ""
            echo "Rapport d'impact déterministe (rayon + risque + consommateurs réels) :"
            echo '```'
            cat impact.md
            echo '```'
            echo ""
            echo "Pour chaque fichier modifié qui est un contrat (contrats/**, doctrine/**),"
            echo "lis son diff (git diff origin/\${{ github.base_ref }}...HEAD -- <fichier>) et vérifie"
            echo "si le changement CASSE une attente d'un consommateur listé (clé/section supprimée"
            echo "ou renommée sur laquelle un consommateur s'appuie, invariant rompu, sens inversé)."
            echo "Rédige un avis COURT (5-10 lignes). N'approuve rien, ne merge rien : tu filtres."
            echo ""
            echo "Termine impérativement par une ligne seule, exactement : CASSE_SEMANTIQUE: oui   (ou CASSE_SEMANTIQUE: non)."
          } > prompt.txt

          echo "----- Prompt envoyé -----"; cat prompt.txt; echo "-------------------------"

          if claude -p "$(cat prompt.txt)" \
              --output-format text \
              --model claude-sonnet-4-6 \
              --max-turns 25 \
              --allowedTools "Read,Grep,Glob,Bash(grep:*),Bash(git:*),Bash(ls:*),Bash(cat:*)" \
              > jugement.md 2> claude-err.log; then
            echo "ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "ran=false" >> "$GITHUB_OUTPUT"
            echo "::warning::L'exécution de Claude Code a échoué (voir le commentaire et les logs)."
          fi

      # (6) Poster l'AVIS ENRICHI = rayon+RISQUE déterministes + jugement sémantique + verdict combiné.
      - name: Poster l'avis enrichi
        if: steps.key.outputs.present == 'true'
        id: verdict
        run: |
          CASSE_STRUCT="${{ steps.impact.outputs.casse_structurelle }}"
          RISQUE="${{ steps.impact.outputs.risque }}"

          if [ "${{ steps.avis.outputs.ran }}" = "true" ]; then
            if grep -qiE '^[[:space:]]*CASSE_SEMANTIQUE:[[:space:]]*oui' jugement.md; then
              CASSE_SEM="oui"
            else
              CASSE_SEM="non"
            fi
          else
            CASSE_SEM="indeterminee"
          fi

          # Verdict combiné : fail si casse LLM OU casse structurelle OU erreur d'exécution LLM.
          if [ "$CASSE_SEM" = "oui" ] || [ "$CASSE_STRUCT" = "true" ] || [ "${{ steps.avis.outputs.ran }}" != "true" ]; then
            VERDICT="fail"
          else
            VERDICT="pass"
          fi
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

          {
            echo "## 🛡️ Avis d'impact — agent-gardien (marche 1 : impact fin déterministe)"
            echo ""
            echo "> Tête-agent du gardien (**doctrine §3**) — elle **calcule et filtre**, **n'approuve pas** (l'auto-approbation du faible risque = marche 2, à venir), et **ne merge jamais**."
            echo ""
            echo "### Calcul déterministe (consommateurs réels)"
            echo ""
            # Corps du rapport SANS ses deux dernières lignes contractuelles (reprises plus bas).
            head -n -2 impact.md
            echo ""
            echo "### Jugement de casse sémantique (LLM, rôle borné)"
            echo ""
            if [ "${{ steps.avis.outputs.ran }}" = "true" ]; then
              cat jugement.md
            else
              echo "⚠️ Jugement LLM non produit — extrait des logs :"
              echo '```'
              tail -n 20 claude-err.log 2>/dev/null || echo "(pas de log)"
              echo '```'
            fi
            echo ""
            echo "### Synthèse"
            echo ""
            echo "| Dimension | Valeur |"
            echo "|---|---|"
            echo "| Rayon / RISQUE (déterministe) | **$RISQUE** |"
            echo "| Casse structurelle (déterministe) | **$CASSE_STRUCT** |"
            echo "| Casse sémantique (jugement LLM) | **$CASSE_SEM** |"
            echo ""
            echo "RISQUE: $RISQUE"
            echo "VERDICT: $VERDICT"
          } > comment.md
          gh pr comment "$PR_NUMBER" --body-file comment.md

      # (7) Statut du check : fail si verdict combiné = fail. Le workflow CONSEILLE et FILTRE ;
      #     la décision de merge reste la porte humaine du gardien (doctrine §3).
      - name: Marquer le statut (pass/fail)
        if: steps.key.outputs.present == 'true'
        run: |
          if [ "${{ steps.verdict.outputs.verdict }}" = "fail" ]; then
            echo "::error::Verdict fail — casse (structurelle ou sémantique) détectée, ou jugement non produit."
            exit 1
          fi
          echo "Verdict pass — avis d'impact déterministe posté. (L'agent filtre ; le merge reste au gardien.)"
