version: "1.9 — promu"
statut: "contrat socle — fait foi"
domicile: "contrats/socle/table-des-crans.yaml"
autorite_de_promotion: "gardien du temple"
adosse_a:
  - "doctrine/doctrine.md (§6)"
  - "contrats/socle/organisation.md"
  - "contrats/socle/anonymisation.md"
# Changelog : v1.9 — promu via boucle de promotion, 2 juillet 2026 : ajout du type d'action deposer_document_mission_zone_travail (cran auto) — dépôt d'un BROUILLON interne (.docx .pptx .xlsx .pdf .md) dans l'espace de mission, cible FIGÉE côté serveur (racine « Missions », GRAPH_MISSION_DRIVE_ID + GRAPH_MISSION_FOLDER_ID, outil T-0024-a), sous-dossier en liste blanche figée, collision=fail, jamais un espace exposé au client ; note rattachant creer_espace_mission (présent depuis v1) à son outillage réel (T-0024-a). Sous-tend la tranche verticale métier (T-0021..T-0024). v1.8 — promu via boucle de promotion, 23 juin 2026 : ajout du type d'action televerser_brouillon_offre_zone_travail (cran auto) — un agent peut déposer un BROUILLON docx (non émis) dans la bibliothèque de travail interne 00 - Proposition en cours, cible FIGÉE côté serveur (garde-fou structurel comme create_list_item), collision=fail (jamais d'écrasement), jamais au niveau 01 des offres signées. L'émission d'offre reste proscrite et humaine. Sous-tend T-0017 / T-0016-b. v1.7 — promu via boucle de promotion, 18 juin 2026 : alignement de l'exception gouvernée « purge » sur la règle de rétention simplifiée (rgpd-recrutement-candidats.md §5, v1.4) — durée unique « suppression 2 ans après la date d'inscription de la fiche (colonne native « Créé le ») », tous les refusés au vivier sauf opposition, nouvelle candidature = nouvelle fiche = nouvelle horloge ; abandon des durées « instruction 3 mois après aboutissement / vivier 2 ans à compter du dernier contact ». Mécanisme gouverné au moindre privilège et runbook du privilège inchangés. v1.6 — EXCEPTION GOUVERNÉE « purge » (T-0013-d), 17 juin 2026 : ajout d'une exception au proscrit supprimer_definitivement_des_donnees — la purge des données de recrutement (instruction 3 mois / vivier 2 ans, durées promues dans rgpd-recrutement-candidats.md §5) s'exécute par un MÉCANISME GOUVERNÉ au moindre privilège, sans humain, sur le modèle de la réconciliation de droits (organisation.md §5). Aucune autre suppression définitive n'est autorisée hors de cette exception. v1.5 — RÉVISION du déclencheur d'anonymisation et requalification des portes (décision du gardien, 12 juin 2026 ; aligne anonymisation.md v1.4, doctrine v1.6, organisation.md v1.3) : la porte anonymisation se déclenche (i) à la COMMUNICATION GRAND PUBLIC et (ii) sur la MATIÈRE D'UN CLIENT TIERS insérée dans un livrable client — le livrable rendu au client pour ses propres données ne déclenche plus (la relation firme-client est la firme) ; « sort de la firme » se lit désormais « communication grand public OU action d'AGENT engageant la firme vis-à-vis d'un client » ; envoyer_livrable_client : cran valide MAINTENU pour l'AGENT, porte tenue par un grade habilité (organisation.md §4 bis) — l'envoi par un HUMAIN collaborateur est libre, hors de cette table ; publier_contenu_externe : pourquoi = communication grand public, porte anonymisation maintenue. v1.4 — cosmétique, 7 juin 2026 : renommage de l'id d'action « reutiliser_matiere_interclient » → « reutiliser_matiere_interne » (le cran est auto depuis v1.3 ; le nom reflète désormais qu'il s'agit de réutilisation INTERNE, nominative). Aucun cran, condition ni comportement modifié ; aucune autre référence à cet id dans le dépôt. v1.3 — CORRECTION du déclencheur d'anonymisation (version machine) : la porte se déclenche à la SORTIE EXTERNE de la firme (publication externe / livrable hors firme), plus sur le « change_de_destinataire » ni sur la réutilisation inter-client interne (qui reste nominative). Aligne anonymisation.md v1.3. v1.2 — promu (contenu inchangé). v1.1 — porte anonymisation rendue explicite dans la dérivation (orthogonale au cran).

# cran = f( réversible ? · sort_de_la_firme ? · rayon_impact )
crans:
  auto:
    conditions: "réversible ET interne ET impact local"
    qui_decide: "l'agent, seul"
  notifie:
    conditions: "réversible et interne, mais engage l'image ou est largement visible"
    qui_decide: "l'agent agit ; le gardien est informé"
  valide:
    conditions: "irréversible OU sort de la firme OU rayon d'impact large"
    # « sort de la firme » se lit désormais : « communication grand public OU action d'AGENT engageant la
    # firme vis-à-vis d'un client » (décision du gardien, 12 juin 2026 — D1/D4). L'envoi d'un livrable par
    # un HUMAIN collaborateur n'est pas une action d'agent : il est LIBRE, hors crans (organisation.md §4 bis).
    qui_decide: "porte humaine (gardien ou rôle désigné) avant l'action"
  anonymisation:
    conditions: "communication grand public ; matière d'un client tiers insérée dans un livrable client — porte automatique, orthogonale ; déclencheur détaillé dans anonymisation.md §1"
    qui_decide: "déclenchée par règle, sans humain ; voir anonymisation.md"

# Évaluation : la première règle qui matche gagne.
# PORTE ANONYMISATION — orthogonale : évaluée À PART, en plus du cran dérivé ci-dessous.
# Elle ne remplace pas le cran ; elle s'ajoute. Voir anonymisation.md §1.
anonymisation_gate:
  - si: "communication_grand_public == true"   # site internet, publication, institutionnel — tout canal non adressé à un client identifié dans une relation contractuelle
    alors: "appliquer anonymisation.md AVANT l'action (en plus du cran)"
  - si: "matiere_client_tiers_dans_livrable_client == true"   # le NDA du client Y ne s'étend pas au client X ; les données du client destinataire restent nominatives
    alors: "appliquer anonymisation.md À CETTE MATIÈRE avant insertion (en plus du cran)"
derivation:
  - si: "sort_de_la_firme == true"   # se lit : communication grand public OU action d'AGENT engageant la firme vis-à-vis d'un client (D1/D4, 12 juin 2026)
    alors: valide
  - si: "reversible == false"
    alors: valide
  - si: "rayon_impact == large"
    alors: valide
  - si: "visible_ou_engage_image == true"   # interne mais visible
    alors: notifie
  - si: "reversible == true ET interne ET rayon_impact == local"
    alors: auto
  - defaut: valide                          # dans le doute, porte humaine

# Types d'action connus — complétés par promotion au fil de l'eau.
actions:
  - id: editer_fichier_en_branche
    cran: auto
    pourquoi: "réversible, interne, local"
  - id: creer_espace_mission
    cran: auto
    exemple: "créer l'espace SharePoint d'une mission"
    note: "outillé le 2 juillet 2026 (T-0024-a) : outil MCP creer_espace_mission — arbre de dossiers à cible figée sous la racine « Missions » (jamais choisie par l'appelant), structure figée dans le code, collision=fail"
  - id: ecrire_fait_derive_zone_proposition
    cran: auto
    pourquoi: "réversible et interne ; le dérivé n'est jamais le saisi"
  - id: televerser_brouillon_offre_zone_travail
    cran: auto
    pourquoi: "écrire un BROUILLON (docx non émis) dans une bibliothèque de travail interne, cible FIGÉE côté serveur (dossier 00 - Proposition en cours) ; réversible (collision=fail, jamais d'écrasement), interne, local. L'émission de l'offre reste proscrite (prendre_engagement_juridique_ou_financier) et humaine. Garde-fou structurel : la cible n'est jamais choisie par l'appelant, jamais le niveau 01 des offres signées."
  - id: deposer_document_mission_zone_travail
    cran: auto
    pourquoi: "déposer un BROUILLON interne (.docx .pptx .xlsx .pdf .md) dans l'espace de mission — cible FIGÉE côté serveur (racine « Missions », GRAPH_MISSION_DRIVE_ID + GRAPH_MISSION_FOLDER_ID, outil T-0024-a), sous-dossier restreint à la liste blanche figée du code ; réversible (collision=fail, jamais d'écrasement), interne, local. Jamais un espace exposé au client : l'envoi d'un livrable reste envoyer_livrable_client (validé, grade habilité)."
  - id: ouvrir_pull_request
    cran: auto
    pourquoi: "un candidat est réversible et n'atteint pas main"
  - id: notifier_equipe
    cran: notifie
    exemple: "message de nomination à l'équipe"
  - id: publier_contenu_externe
    cran: valide
    pourquoi: "communication grand public"
    # Communication grand public : passe AUSSI la porte d'anonymisation (anonymisation.md §1).
  - id: envoyer_livrable_client
    cran: valide
    qui: "grade habilité (organisation.md §4 bis)"
    pourquoi: "action d'AGENT : engage la firme vis-à-vis du client — porte humaine de supervision de l'agent. L'envoi par un HUMAIN collaborateur n'est pas une action d'agent : il est LIBRE, hors de cette table (organisation.md §4 bis). La porte anonymisation ne joue que pour la matière d'un client tiers (anonymisation.md §1)."
  - id: merger_sur_main
    cran: valide
    qui: "gardien seulement"
    pourquoi: "promotion = mise en service de la vérité"
  - id: promouvoir_contrat_socle
    cran: valide
    qui: "gardien"
  - id: promouvoir_contrat_local
    cran: valide
    qui: "gardien (procédure allégée)"
  - id: modifier_design_system
    cran: valide
    pourquoi: "interne mais rayon d'impact large (toute la firme)"
  - id: reutiliser_matiere_interne
    cran: auto
    pourquoi: "réutilisation INTERNE (autre mission / autre client, sans sortie de firme) : réversible, interne, local — reste NOMINATIF, pas d'anonymisation (avantage qui compose)"
    note: "L'anonymisation ne se déclenche qu'aux déclencheurs d'anonymisation.md §1 (communication grand public ; matière d'un client tiers insérée dans un livrable client — révision v1.5/12 juin 2026). La réutilisation inter-client interne ne la déclenche pas (correction v1.3, inchangée)."
  - id: deleguer_un_perimetre
    cran: valide
    qui: "gardien"
    pourquoi: "modifie organisation.md et ouvre des droits — voir chaîne d'autorité"

# Jamais par un agent ni par Claude — runbook humain (cf. plan §2).
proscrites:
  - saisir_identifiants_ou_secrets
  - configurer_authentification_sso_oauth
  - modifier_droits_permissions_ou_protection_de_branche
  - parametrer_tenant_m365_securite_residence_donnees
  - supprimer_definitivement_des_donnees
  - prendre_engagement_juridique_ou_financier

# Exception gouvernée : les droits M365 ne changent que par réconciliation au
# moindre privilège d'une décision DÉJÀ promue (voir organisation.md §5).
#
# Exception gouvernée « purge » (T-0013-d) : la SUPPRESSION définitive des données de
# recrutement échues est autorisée À UN MÉCANISME GOUVERNÉ au moindre privilège — et à
# lui SEUL — lorsqu'elle applique une durée DÉJÀ promue (rgpd-recrutement-candidats.md §5 :
# suppression 2 ans après la date d'inscription de la fiche, colonne native « Créé le » ; tous
# les refusés au vivier sauf opposition ; nouvelle candidature = nouvelle fiche = nouvelle
# horloge). Même logique que la réconciliation de droits : pas un agent qui supprime librement,
# un mécanisme qui projette une décision promue, tracé, ne sachant QUE purger selon cette durée. La mise en
# place de son privilège reste un RUNBOOK HUMAIN (organisation.md §5). Hors de cette exception,
# supprimer_definitivement_des_donnees reste PROSCRIT.
# épreuve intégration T-0020-c marche 1 — NE PAS MERGER
