skill: consolidation-pilotage
version_harnais: 1
cas:
  - id: nominal-01
    type: invariant
    description: "Cas nominal — grille prévue 2 ressources × 3 mois + 2 factures : transformation matriciel → long, une ligne par cellule renseignée, mois au 1er du mois."
    contient:
      - "matriciel → long"
      - "(Ressource, Mois) dont la valeur > 0"
      - "1er du mois"
  - id: fusion-02
    type: invariant
    description: "Régénération réconciliée — montant d'une facture existante modifié : le gabarit est régénéré (jamais réécrit en place), sans suppression ; clé (CodeMission, NumFacture)."
    contient:
      - "RÉGÉNÉRATION RÉCONCILIÉE, JAMAIS DE SUPPRESSION"
      - "(CodeMission, NumFacture)"
  - id: garde-03
    type: invariant
    description: "Garde — un mois existant repassé à 0 : aucune écriture qui efface, la ligne est reportée dans le jeu régénéré + anomalie attendue."
    contient:
      - "n'efface RIEN au gabarit"
      - "correction de suppression à confirmer par le responsable"
  - id: archivage-04
    type: invariant
    description: "Archivage = DÉPLACEMENT (T-0035 reprise n°4) : workbook_archiver_gabarit déplace le gabarit courant vers 00 - Old (synchrone), ce qui LIBÈRE le nom pour la ré-instanciation fail-closed."
    contient:
      - "workbook_archiver_gabarit"
      - "DÉPLACE"
      - "Le déplacement est SYNCHRONE"
  - id: cran-05
    type: invariant
    description: "Cran — reconcilier_gabarit_pilotage = auto, réversible par archivage par DÉPLACEMENT (nom libéré, version conservée dans 00 - Old) + régénération sans suppression."
    contient:
      - "reconcilier_gabarit_pilotage"
      - "archivage par DÉPLACEMENT"
  - id: reconciliation-10
    type: invariant
    description: "Régénération d'un gabarit EXISTANT rendue machine : réconcilier en mémoire → archiver (déplacement, nom libéré) → ré-instancier (preuve froide) → repeupler ; idempotent, réversible (00 - Old), journalisé."
    contient:
      - "archiver (DÉPLACEMENT, nom libéré)"
      - "ré-instancier"
      - "preuve FROIDE §8"
  - id: bornage-06
    type: invariant
    description: "Garde-fou structurel — écriture bornée par construction : le skill ne manipule jamais de drive_id/item_id en écriture."
    contient:
      - "ne manipule jamais de `drive_id`/`item_id` en écriture"
  - id: statut-validation-07
    type: invariant
    description: "Garde-fou — jamais de rétrogradation d'un StatutValidation validé vers à valider sans changement de jours."
    contient:
      - "Ne JAMAIS rétrograder un `StatutValidation` « validé » vers « à valider »"
  - id: anomalies-08
    type: invariant
    description: "Anomalies signalées jamais résolues seul — convention d'identifiant ressource (mail Allia / mail du sous-traitant)."
    contient:
      - "mail Allia"
      - "mail du sous-traitant"
  - id: instanciation-09
    type: invariant
    description: "Instanciation — saisie d'une mission SANS gabarit : l'agent instancie (workbook_instancier_gabarit), sans archivage préalable, puis écrit nominalement."
    contient:
      - "l'agent l'INSTANCIE, puis poursuit la consolidation"
      - "workbook_instancier_gabarit"
      - "ne subit PAS d'archivage préalable"
